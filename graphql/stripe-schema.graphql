"""Radar value list."""
type RadarValueList {
  id: ID!
  object: String!
  alias: String!
  created: DateTime!
  createdBy: String!
  itemType: String!
  listItems: JSON
  livemode: Boolean!
  metadata: JSON!
  name: String!
}

"""Transfer reversal."""
type TransferReversal {
  id: ID!
  object: String!
  amount: Int!
  balanceTransaction: BalanceTransaction
  created: DateTime!
  currency: Currency!
  destinationPaymentRefund: String
  metadata: JSON!
  sourceRefund: String
  transfer: Transfer!
}

"""External account (bank account or card) on a Stripe account."""
type ExternalAccount {
  id: ID!
  object: String!
  account: String
  accountHolderName: String
  accountHolderType: String
  accountType: String
  availablePayoutMethods: [String!]
  bankName: String
  brand: String
  country: String
  currency: Currency!
  customer: String
  defaultForCurrency: Boolean
  expMonth: Int
  expYear: Int
  fingerprint: String
  funding: String
  last4: String!
  livemode: Boolean!
  metadata: JSON!
  routingNumber: String
  status: String
}

"""File link granting temporary access to a file."""
type FileLink {
  id: ID!
  object: String!
  created: DateTime!
  expired: Boolean!
  expiresAt: DateTime
  file: File!
  livemode: Boolean!
  metadata: JSON!
  url: String
}

