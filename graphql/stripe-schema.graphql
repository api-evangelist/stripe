"""
Stripe Conceptual GraphQL Schema
=================================
Derived from Stripe's public REST API data model (https://docs.stripe.com/api).
Stripe does not offer a public GraphQL endpoint. This schema is a conceptual SDL
representation for design reference, code generation, and GraphQL gateway use cases.

All types, fields, and relationships map directly to Stripe REST objects and fields
as documented in the official API reference. Field names follow GraphQL camelCase
conventions; REST snake_case equivalents are noted in field descriptions where helpful.
"""

scalar JSON
scalar DateTime

