# ---------------------------------------------------------------------------
# Root Query type
# ---------------------------------------------------------------------------

type Query {
  """Retrieve a PaymentIntent by ID."""
  paymentIntent(id: ID!): PaymentIntent

  """List PaymentIntents with optional filters."""
  paymentIntents(
    customer: ID
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): PaymentIntentList!

  """Retrieve a PaymentMethod by ID."""
  paymentMethod(id: ID!): PaymentMethod

  """Retrieve a Customer by ID."""
  customer(id: ID!): Customer

  """List Customers."""
  customers(
    email: String
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): CustomerList!

  """Retrieve a Charge by ID."""
  charge(id: ID!): Charge

  """List Charges."""
  charges(
    customer: ID
    paymentIntent: ID
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): ChargeList!

  """Retrieve a Refund by ID."""
  refund(id: ID!): Refund

  """List Refunds."""
  refunds(
    charge: ID
    paymentIntent: ID
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): RefundList!

  """Retrieve the Balance for the account."""
  balance: Balance!

  """Retrieve a BalanceTransaction by ID."""
  balanceTransaction(id: ID!): BalanceTransaction

  """List BalanceTransactions."""
  balanceTransactions(
    type: String
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): BalanceTransactionList!

  """Retrieve an Invoice by ID."""
  invoice(id: ID!): Invoice

  """List Invoices."""
  invoices(
    customer: ID
    subscription: ID
    status: InvoiceStatus
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): InvoiceList!

  """Retrieve a Subscription by ID."""
  subscription(id: ID!): Subscription

  """List Subscriptions."""
  subscriptions(
    customer: ID
    price: ID
    status: SubscriptionStatus
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): SubscriptionList!

  """Retrieve a Product by ID."""
  product(id: ID!): Product

  """List Products."""
  products(
    active: Boolean
    url: String
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): ProductList!

  """Retrieve a Price by ID."""
  price(id: ID!): Price

  """List Prices."""
  prices(
    active: Boolean
    product: ID
    type: PriceType
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): PriceList!

  """Retrieve a Coupon by ID."""
  coupon(id: ID!): Coupon

  """Retrieve a PromotionCode by ID."""
  promotionCode(id: ID!): PromotionCode

  """Retrieve a Plan by ID (legacy)."""
  plan(id: ID!): Plan

  """Retrieve a TaxRate by ID."""
  taxRate(id: ID!): TaxRate

  """Retrieve a Payout by ID."""
  payout(id: ID!): Payout

  """List Payouts."""
  payouts(
    status: PayoutStatus
    arrivalDate: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): PayoutList!

  """Retrieve a Transfer by ID."""
  transfer(id: ID!): Transfer

  """List Transfers."""
  transfers(
    destination: ID
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): TransferList!

  """Retrieve an Event by ID."""
  event(id: ID!): Event

  """List Events."""
  events(
    type: String
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): EventList!

  """Retrieve a WebhookEndpoint by ID."""
  webhookEndpoint(id: ID!): WebhookEndpoint

  """List WebhookEndpoints."""
  webhookEndpoints(
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): WebhookEndpointList!

  """Retrieve a Dispute by ID."""
  dispute(id: ID!): Dispute

  """List Disputes."""
  disputes(
    charge: ID
    paymentIntent: ID
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): DisputeList!

  """Retrieve a Checkout Session by ID."""
  checkoutSession(id: ID!): CheckoutSession

  """List Checkout Sessions."""
  checkoutSessions(
    customer: ID
    paymentIntent: ID
    subscription: ID
    status: CheckoutSessionStatus
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): CheckoutSessionList!

  """Retrieve a PaymentLink by ID."""
  paymentLink(id: ID!): PaymentLink

  """List PaymentLinks."""
  paymentLinks(
    active: Boolean
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): PaymentLinkList!

  """Retrieve a CreditNote by ID."""
  creditNote(id: ID!): CreditNote

  """List CreditNotes."""
  creditNotes(
    customer: ID
    invoice: ID
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): CreditNoteList!

  """Retrieve a File by ID."""
  file(id: ID!): File

  """List Files."""
  files(
    purpose: FilePurpose
    created: Int
    limit: Int
    startingAfter: ID
    endingBefore: ID
  ): FileList!

  """Retrieve a connected Account by ID (Connect)."""
  account(id: ID!): Account

  """Retrieve a SetupIntent by ID."""
  setupIntent(id: ID!): SetupIntent

  """Retrieve a Source by ID (legacy)."""
  source(id: ID!): Source

  """Retrieve an EarlyFraudWarning by ID (Radar)."""
  earlyFraudWarning(id: ID!): EarlyFraudWarning

  """Retrieve a Review by ID (Radar)."""
  review(id: ID!): Review
}

# ---------------------------------------------------------------------------
# Root Mutation type
# ---------------------------------------------------------------------------

type Mutation {
  """Create a PaymentIntent."""
  createPaymentIntent(
    amount: Int!
    currency: Currency!
    customer: ID
    paymentMethodTypes: [String!]
    description: String
    metadata: JSON
    receiptEmail: String
    setupFutureUsage: String
    statementDescriptor: String
  ): PaymentIntent!

  """Confirm a PaymentIntent."""
  confirmPaymentIntent(
    id: ID!
    paymentMethod: ID
    returnUrl: String
  ): PaymentIntent!

  """Capture a PaymentIntent."""
  capturePaymentIntent(id: ID!, amountToCapture: Int): PaymentIntent!

  """Cancel a PaymentIntent."""
  cancelPaymentIntent(id: ID!, cancellationReason: PaymentIntentCancellationReason): PaymentIntent!

  """Create a Customer."""
  createCustomer(
    email: String
    name: String
    phone: String
    description: String
    address: JSON
    metadata: JSON
    paymentMethod: ID
  ): Customer!

  """Update a Customer."""
  updateCustomer(id: ID!, email: String, name: String, metadata: JSON): Customer!

  """Delete a Customer."""
  deleteCustomer(id: ID!): DeleteResult!

  """Create a Refund."""
  createRefund(
    charge: ID
    paymentIntent: ID
    amount: Int
    reason: RefundReason
    metadata: JSON
  ): Refund!

  """Create a Product."""
  createProduct(
    name: String!
    description: String
    active: Boolean
    metadata: JSON
    images: [String!]
    url: String
  ): Product!

  """Update a Product."""
  updateProduct(id: ID!, name: String, description: String, active: Boolean, metadata: JSON): Product!

  """Delete a Product."""
  deleteProduct(id: ID!): DeleteResult!

  """Create a Price."""
  createPrice(
    currency: Currency!
    product: ID!
    unitAmount: Int
    recurring: JSON
    type: PriceType
    metadata: JSON
    lookupKey: String
    nickname: String
    taxBehavior: String
  ): Price!

  """Create a Coupon."""
  createCoupon(
    amountOff: Int
    percentOff: Float
    currency: Currency
    duration: CouponDuration!
    durationInMonths: Int
    maxRedemptions: Int
    name: String
    redeemBy: Int
    metadata: JSON
  ): Coupon!

  """Delete a Coupon."""
  deleteCoupon(id: ID!): DeleteResult!

  """Create a PromotionCode."""
  createPromotionCode(
    coupon: ID!
    code: String
    active: Boolean
    customer: ID
    expiresAt: Int
    maxRedemptions: Int
    metadata: JSON
  ): PromotionCode!

  """Create an Invoice."""
  createInvoice(
    customer: ID!
    description: String
    footer: String
    metadata: JSON
    daysUntilDue: Int
    collectionMethod: String
    defaultPaymentMethod: ID
    autoAdvance: Boolean
  ): Invoice!

  """Finalize an Invoice (move from draft to open)."""
  finalizeInvoice(id: ID!, autoAdvance: Boolean): Invoice!

  """Pay an Invoice immediately."""
  payInvoice(id: ID!, paymentMethod: ID): Invoice!

  """Void an Invoice."""
  voidInvoice(id: ID!): Invoice!

  """Mark an Invoice as uncollectible."""
  markUncollectible(id: ID!): Invoice!

  """Create a Subscription."""
  createSubscription(
    customer: ID!
    items: [JSON!]!
    defaultPaymentMethod: ID
    trialEnd: Int
    trialPeriodDays: Int
    metadata: JSON
    collectionMethod: String
  ): Subscription!

  """Update a Subscription."""
  updateSubscription(
    id: ID!
    items: [JSON!]
    defaultPaymentMethod: ID
    metadata: JSON
    cancelAtPeriodEnd: Boolean
  ): Subscription!

  """Cancel a Subscription."""
  cancelSubscription(id: ID!, cancelAtPeriodEnd: Boolean): Subscription!

  """Create a Payout."""
  createPayout(
    amount: Int!
    currency: Currency!
    description: String
    destination: ID
    metadata: JSON
    method: String
    statementDescriptor: String
  ): Payout!

  """Cancel a Payout."""
  cancelPayout(id: ID!): Payout!

  """Create a Transfer (Connect)."""
  createTransfer(
    amount: Int!
    currency: Currency!
    destination: ID!
    description: String
    metadata: JSON
    transferGroup: String
  ): Transfer!

  """Create a WebhookEndpoint."""
  createWebhookEndpoint(
    url: String!
    enabledEvents: [String!]!
    description: String
    metadata: JSON
    apiVersion: String
  ): WebhookEndpoint!

  """Update a WebhookEndpoint."""
  updateWebhookEndpoint(
    id: ID!
    url: String
    enabledEvents: [String!]
    disabled: Boolean
    metadata: JSON
  ): WebhookEndpoint!

  """Delete a WebhookEndpoint."""
  deleteWebhookEndpoint(id: ID!): DeleteResult!

  """Create a Checkout Session."""
  createCheckoutSession(
    mode: CheckoutSessionMode!
    lineItems: [JSON!]
    customer: ID
    customerEmail: String
    successUrl: String
    cancelUrl: String
    currency: Currency
    metadata: JSON
    expiresAt: Int
    allowPromotionCodes: Boolean
  ): CheckoutSession!

  """Expire a Checkout Session."""
  expireCheckoutSession(id: ID!): CheckoutSession!

  """Create a PaymentLink."""
  createPaymentLink(
    lineItems: [JSON!]!
    metadata: JSON
    currency: Currency
    allowPromotionCodes: Boolean
    afterCompletion: JSON
  ): PaymentLink!

  """Create a CreditNote."""
  createCreditNote(
    invoice: ID!
    amount: Int
    lines: [JSON!]
    memo: String
    reason: String
    metadata: JSON
  ): CreditNote!

  """Create a SetupIntent."""
  createSetupIntent(
    customer: ID
    paymentMethodTypes: [String!]
    description: String
    metadata: JSON
    usage: String
  ): SetupIntent!

  """Confirm a SetupIntent."""
  confirmSetupIntent(id: ID!, paymentMethod: ID, returnUrl: String): SetupIntent!

  """Cancel a SetupIntent."""
  cancelSetupIntent(id: ID!, cancellationReason: SetupIntentCancellationReason): SetupIntent!

  """Upload a File."""
  createFile(purpose: FilePurpose!, file: String!): File!

  """Create a TaxRate."""
  createTaxRate(
    displayName: String!
    percentage: Float!
    inclusive: Boolean!
    active: Boolean
    country: String
    description: String
    jurisdiction: String
    metadata: JSON
    state: String
    taxType: String
  ): TaxRate!

  """Close a Dispute (accept loss)."""
  closeDispute(id: ID!): Dispute!

  """Update Dispute evidence."""
  updateDispute(id: ID!, evidence: JSON, metadata: JSON, submit: Boolean): Dispute!

  """Approve a Review (Radar)."""
  approveReview(id: ID!): Review!
}

"""Result of a delete operation."""
type DeleteResult {
  id: ID!
  object: String!
  deleted: Boolean!
}
