  description: String
  invoice: Invoice
  lastPaymentError: StripeError
  latestCharge: Charge
  livemode: Boolean!
  metadata: JSON!
  nextAction: PaymentIntentNextAction
  onBehalfOf: String
  paymentMethod: PaymentMethod
  paymentMethodConfigurationDetails: JSON
  paymentMethodOptions: PaymentMethodOptions
