# ---------------------------------------------------------------------------
# Shared / embedded types
# ---------------------------------------------------------------------------

"""Stripe Address object used across accounts, customers, and shipping."""
type Address {
  city: String
  country: String
  line1: String
  line2: String
  postalCode: String
  state: String
}

"""Shipping information attached to charges, orders, and customers."""
type Shipping {
  address: Address
  carrier: String
  name: String
  phone: String
  trackingNumber: String
}

"""Billing details attached to payment methods and charges."""
type BillingDetails {
  address: Address
  email: String
  name: String
  phone: String
}

"""Period used in subscription items, invoices, and billing."""
type Period {
  start: DateTime!
  end: DateTime!
}

"""Card details (subset; embedded on PaymentMethod and Charge)."""
type CardDetails {
  brand: PaymentMethodCardBrand!
  country: String
  expMonth: Int!
  expYear: Int!
  fingerprint: String
  funding: PaymentMethodCardFunding!
  last4: String!
  network: String
  three_d_secure_usage: ThreeDSecureUsage
  checks: CardChecks
}

type ThreeDSecureUsage {
  supported: Boolean!
}

type CardChecks {
  addressLine1Check: String
  addressPostalCodeCheck: String
  cvcCheck: String
}

type CardNetworks {
  available: [String!]!
  preferred: String
}

"""Bank account details embedded on payment methods."""
type UsBankAccountDetails {
  accountHolderType: String
  accountType: String
  bankName: String
  financialConnectionsAccount: String
  fingerprint: String
  last4: String
  networks: UsBankAccountNetworks
  routingNumber: String
}

type UsBankAccountNetworks {
  preferred: String
  supported: [String!]!
}

type SepaDebitDetails {
  bankCode: String
  branchCode: String
  country: String
  fingerprint: String
  generatedFrom: SepaDebitGeneratedFrom
  last4: String
}

type SepaDebitGeneratedFrom {
  charge: String
  setupAttempt: String
}

"""Automatic tax calculation result."""
type AutomaticTax {
  enabled: Boolean!
  liability: AutomaticTaxLiability
  status: String
}

type AutomaticTaxLiability {
  account: String
  type: String!
}

"""Error details returned by the Stripe API."""
type StripeError {
  charge: String
  code: String
  declineCode: String
  docUrl: String
  message: String
  param: String
  paymentIntent: PaymentIntent
  paymentMethod: PaymentMethod
  type: String!
}

"""A single tier in tiered pricing."""
type PriceTier {
  flatAmount: Int
  flatAmountDecimal: String
  unitAmount: Int
  unitAmountDecimal: String
  upTo: Int
}

"""Recurring settings on a Price."""
type PriceRecurring {
  aggregateUsage: PriceRecurringAggregateUsage
  interval: PriceRecurringInterval!
  intervalCount: Int!
  meterEventName: String
  usageType: PriceRecurringUsageType!
}

"""Transform quantity settings for unit-based pricing."""
type TransformQuantity {
  divideBy: Int!
