}

"""Tax amount detail on an invoice line."""
type TaxAmount {
  amount: Int!
  inclusive: Boolean!
  taxRate: TaxRate!
}

"""Discount applied to an invoice or subscription."""
type Discount {
  id: ID!
  object: String!
  checkoutSession: String
  coupon: Coupon!
  customer: Customer
  end: DateTime
  invoice: String
  invoiceItem: String
  promotionCode: PromotionCode
  start: DateTime!
  subscription: String
  subscriptionItem: String
}

"""Apply-to restriction for a promotion code."""
type PromotionCodeRestrictions {
  currencyOptions: JSON
  firstTimeTransaction: Boolean!
  minimumAmount: Int
  minimumAmountCurrency: String
}

"""Subscription billing_thresholds."""
type SubscriptionBillingThresholds {
  amountGte: Int
  resetBillingCycleAnchor: Boolean
}

"""Subscription item billing_thresholds."""
type SubscriptionItemBillingThresholds {
  usageGte: Int
}

"""Subscription pause collection settings."""
type SubscriptionPauseCollection {
  behavior: String!
  resumesAt: DateTime
}

"""Subscription payment settings."""
type SubscriptionPaymentSettings {
  paymentMethodOptions: JSON
  paymentMethodTypes: [String!]
  saveDefaultPaymentMethod: String
}

"""Invoice customer_tax_exempt status."""
type InvoiceCustomerTaxExempt {
  exempt: Boolean
  reverse: Boolean
}

"""Next action on a PaymentIntent (e.g. redirect_to_url, use_stripe_sdk)."""
type PaymentIntentNextAction {
  type: String!
