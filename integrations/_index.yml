# Stripe integrations, expressed as forkable Arazzo workflows.
# Each entry maps a real Stripe integration to a 2-source Arazzo artifact whose steps
# call verified operationIds in the real OpenAPI for BOTH ends (see the arazzo file).
# Entries with arazzo: null are known integrations whose partner has no OpenAPI in the
# catalog yet, so a faithful workflow cannot be authored without fabrication (pending).
# Converted from the retired Naftiko capability format 2026-07-14.
- slug: stripe-amplitude
  label: Send Stripe revenue events to Amplitude
  partner: amplitude
  category: Analytics
  use_case: For each succeeded Stripe charge, send a corresponding revenue event to Amplitude.
  arazzo: stripe-amplitude.yml
- slug: stripe-anrok
  label: Post Stripe SaaS subscriptions to Anrok for sales-tax compliance
  partner: anrok
  category: Tax
  use_case: Retrieve a Stripe invoice and mirror it into Anrok as a seller transaction for sales-tax exposure
    tracking.
  arazzo: stripe-anrok.yml
- slug: stripe-auth0
  label: Provision Auth0 Users from Stripe Customers
  partner: auth0
  category: Auth
  use_case: When a Stripe customer is created via paid signup, retrieve it and provision a matching Auth0
    user inheriting the email.
  arazzo: stripe-auth0.yml
- slug: stripe-avalara
  label: Calculate Avalara tax at Stripe Checkout
  partner: avalara
  category: Tax
  use_case: Compute cart tax with Avalara AvaTax, then attach it to a Stripe Checkout Session.
  arazzo: stripe-avalara.yml
- slug: stripe-bigcommerce
