naftiko: 1.0.0-alpha2
info:
  label: Push Stripe successful charges as HubSpot deals
  description: When a Stripe charge succeeds, create or update a HubSpot Deal in the Closed Won stage attached to the matching Contact.
  tags:
  - Stripe
  - Integration
  - CRM
  - hubspot
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
    HUBSPOT_API_KEY: HUBSPOT_API_KEY
capability:
  consumes:
  - type: http
    namespace: stripe
    baseUri: https://api.stripe.com
    description: Stripe API operations consumed by this integration.
    resources:
    - name: v1-charges
      path: /v1/charges
      operations:
      - name: getcharges
        method: GET
        description: List Stripe charges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: v1-charges-id
      path: /v1/charges/{id}
      operations:
      - name: getcharge
        method: GET
        description: Retrieve a Stripe charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  - type: http
    namespace: hubspot
    baseUri: https://api.hubapi.com
    description: HubSpot CRM API operations consumed by this integration.
    resources:
    - name: crm-v3-objects-deals
      path: /crm/v3/objects/deals
      operations:
      - name: createdeal
        method: POST
        description: 'HubSpot CRM API: createDeal'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-v3-objects-contacts-contactid
      path: /crm/v3/objects/contacts/{contactId}
      operations:
      - name: getcontact
        method: GET
        description: 'HubSpot CRM API: getContact'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contactId
          in: path
          type: string
          description: Path parameter contactId.
          required: true
  exposes:
  - type: mcp
    namespace: stripe-hubspot-mcp
    description: MCP adapter for the stripe-hubspot integration.
    tools:
    - name: stripe_hubspot
      description: Execute the stripe hubspot integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: The triggering event payload (Stripe event or partner event).
        required:
        - trigger_event
  - type: rest
    namespace: stripe-hubspot-rest
    port: 8080
    description: REST adapter for the stripe-hubspot integration.
    resources:
    - path: /stripe-hubspot
      name: stripe-hubspot
      description: REST surface for the stripe-hubspot integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the stripe-hubspot integration.
        call: stripe_hubspot
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
