naftiko: 1.0.0-alpha2
info:
  label: Post Stripe payment alerts to Slack channels
  description: Forward Stripe payment / dispute / payout events to a designated Slack channel via Incoming Webhook.
  tags:
  - Stripe
  - Integration
  - Notifications
  - slack
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: stripe
    baseUri: https://api.stripe.com
    description: Stripe API operations consumed by this integration.
    resources:
    - name: v1-charges-id
      path: /v1/charges/{id}
      operations:
      - name: getcharge
        method: GET
        description: Retrieve a Stripe charge
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
    - name: v1-disputes-id
      path: /v1/disputes/{id}
      operations:
      - name: getdispute
        method: GET
        description: Retrieve a Stripe dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
    - name: v1-payouts-id
      path: /v1/payouts/{id}
      operations:
      - name: getpayout
        method: GET
        description: Retrieve a Stripe payout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Path parameter id.
          required: true
  - type: http
    namespace: slack
    baseUri: https://hooks.slack.com
    description: Slack Incoming Webhooks operations consumed by this integration.
    resources:
    - name: services-t-b-x
      path: /services/{T}/{B}/{X}
      operations:
      - name: postmessage
        method: POST
        description: 'Slack Incoming Webhooks: postMessage'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: T
          in: path
          type: string
          description: Path parameter T.
          required: true
        - name: B
          in: path
          type: string
          description: Path parameter B.
          required: true
        - name: X
          in: path
          type: string
          description: Path parameter X.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: stripe-slack-mcp
    description: MCP adapter for the stripe-slack integration.
    tools:
    - name: stripe_slack
      description: Execute the stripe slack integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: The triggering event payload (Stripe event or partner event).
        required:
        - trigger_event
  - type: rest
    namespace: stripe-slack-rest
    port: 8080
    description: REST adapter for the stripe-slack integration.
    resources:
    - path: /stripe-slack
      name: stripe-slack
      description: REST surface for the stripe-slack integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the stripe-slack integration.
        call: stripe_slack
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
