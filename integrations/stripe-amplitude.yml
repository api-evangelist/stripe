arazzo: 1.0.1
info:
  title: Send Stripe Revenue Events to Amplitude
  summary: For each succeeded Stripe charge, send a corresponding revenue event to Amplitude.
  description: >-
    This workflow retrieves a Stripe charge by its identifier and then forwards a
    matching revenue event to Amplitude's HTTP V2 ingestion endpoint. The charge
    amount, currency, and customer are mapped into an Amplitude event so product
    analytics stay in sync with billing activity. Fork it to wire your own Stripe
    charge succeeded events into Amplitude revenue tracking.
  version: 1.0.0
sourceDescriptions:
  - name: stripe
    url: https://raw.githubusercontent.com/api-evangelist/stripe/refs/heads/main/openapi/charges-openapi-original.yml
    type: openapi
  - name: amplitude
    url: https://raw.githubusercontent.com/api-evangelist/amplitude/refs/heads/main/openapi/amplitude-http-v2-api-openapi.yml
    type: openapi
workflows:
  - workflowId: stripe-amplitude-track-revenue
    summary: Retrieve a Stripe charge and send it to Amplitude as a revenue event.
    description: >-
      Fetches a succeeded charge from Stripe by id, then uploads a revenue event to
      Amplitude mapping the charge amount and currency into the event payload.
    inputs:
      type: object
      required:
        - charge
        - amplitude_api_key
      properties:
        charge:
          type: string
          description: The identifier of the Stripe charge to retrieve.
        amplitude_api_key:
          type: string
          description: The API key for the Amplitude project events will be sent to.
        user_id:
          type: string
          description: The Amplitude user id to attribute the revenue event to.
    steps:
      - stepId: retrieve-charge
        description: Retrieve the Stripe charge by its identifier.
        operationId: $sourceDescriptions.stripe.GetChargesCharge
        parameters:
          - name: charge
            in: path
            value: $inputs.charge
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          id: $response.body#/id
          amount: $response.body#/amount
          currency: $response.body#/currency
          customer: $response.body#/customer
      - stepId: upload-revenue-event
        description: Send the charge to Amplitude as a revenue event.
        operationId: $sourceDescriptions.amplitude.uploadEvents
        requestBody:
          contentType: application/json
          payload:
            api_key: $inputs.amplitude_api_key
            events:
              - user_id: $inputs.user_id
                event_type: Stripe Charge Succeeded
                revenue: $steps.retrieve-charge.outputs.amount
                event_properties:
                  charge_id: $steps.retrieve-charge.outputs.id
                  currency: $steps.retrieve-charge.outputs.currency
                  customer: $steps.retrieve-charge.outputs.customer
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          code: $response.body#/code
          events_ingested: $response.body#/events_ingested
    outputs:
      charge_id: $steps.retrieve-charge.outputs.id
      events_ingested: $steps.upload-revenue-event.outputs.events_ingested
