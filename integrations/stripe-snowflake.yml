arazzo: 1.0.1
info:
  title: Stream Stripe events into Snowflake
  summary: Pull recent Stripe events and trigger a Snowflake pipe to ingest them into a table for BI.
  description: >-
    This workflow replicates the legacy Stripe-to-Snowflake data pipeline as a forkable
    Arazzo artifact. It first lists recent Stripe events via the Stripe Events API, then
    triggers the target Snowflake pipe to refresh and copy the staged event files into a
    Snowflake table so they are available for downstream business intelligence.
  version: 1.0.0
sourceDescriptions:
  - name: stripe
    url: https://raw.githubusercontent.com/api-evangelist/stripe/refs/heads/main/openapi/stripe-events-api-openapi.yml
    type: openapi
  - name: snowflake
    url: https://raw.githubusercontent.com/api-evangelist/snowflake/refs/heads/main/openapi/pipe.yaml
    type: openapi
workflows:
  - workflowId: stripe-snowflake-ingest
    summary: List Stripe events, then refresh a Snowflake pipe to ingest them.
    description: >-
      Fetches recent Stripe events, then triggers the named Snowflake pipe to copy the
      staged event files into the destination table for analytics.
    inputs:
      type: object
      properties:
        created_gte:
          type: integer
          description: Only return Stripe events created on or after this Unix timestamp.
        limit:
          type: integer
          description: Maximum number of Stripe events to return (1-100).
        database:
          type: string
          description: Snowflake database that contains the target pipe.
        schema:
          type: string
          description: Snowflake schema that contains the target pipe.
        pipe_name:
          type: string
          description: Name of the Snowflake pipe to refresh.
        prefix:
          type: string
          description: Optional stage path/prefix limiting the files the pipe loads.
        modified_after:
          type: string
          description: ISO-8601 timestamp of the oldest staged files to ingest.
      required:
        - database
        - schema
        - pipe_name
    steps:
      - stepId: list-stripe-events
        description: List recent Stripe events to be loaded into Snowflake.
        operationId: $sourceDescriptions.stripe.getEvents
        parameters:
          - name: created
            in: query
            value: $inputs.created_gte
          - name: limit
            in: query
            value: $inputs.limit
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          events: $response.body#/data
          has_more: $response.body#/has_more
      - stepId: refresh-snowflake-pipe
        description: Trigger the Snowflake pipe to ingest the staged Stripe event files.
        operationId: $sourceDescriptions.snowflake.refreshPipe
        parameters:
          - name: database
            in: path
            value: $inputs.database
          - name: schema
            in: path
            value: $inputs.schema
          - name: name
            in: path
            value: $inputs.pipe_name
          - name: prefix
            in: query
            value: $inputs.prefix
          - name: modified_after
            in: query
            value: $inputs.modified_after
        successCriteria:
          - condition: $statusCode == 200
        outputs:
          ingest_status: $response.body#/status
    outputs:
      events: $steps.list-stripe-events.outputs.events
      ingest_status: $steps.refresh-snowflake-pipe.outputs.ingest_status
