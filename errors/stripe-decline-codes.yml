  - {code: security_violation, meaning: Declined for unknown reason, action: Customer contacts issuer.}
  - {code: service_not_allowed, meaning: Declined for unknown reason, action: Customer contacts issuer.}
  - {code: stolen_card, meaning: Card reported stolen, action: Present as generic_decline; do not reveal details.}
  - {code: stop_payment_order, meaning: Declined for unknown reason, action: Customer contacts issuer.}
  - {code: testmode_decline, meaning: A test card number was used, action: Use a genuine card.}
