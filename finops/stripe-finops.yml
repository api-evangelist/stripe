specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Stripe
providerId: stripe
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - FinOps
  - Cost Management
  - FOCUS
  - Payments
description: 'FOCUS-aligned FinOps for Stripe: per-transaction take rates plus per-product subscriptions.'
sources:
  - https://stripe.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Stripe, Inc.
serviceCategory: Payments
billingModel:
  pricingCategory: Take Rate + Subscription
  billingFrequency: Continuous Settlement
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: Stripe
  ServiceCategory: Payments
  ProviderName: Stripe
  PublisherName: Stripe, Inc.
  InvoiceIssuerName: Stripe, Inc.
  BillingCurrency: USD
meters:
  - name: card_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - country
      - card_brand
      - card_type
      - currency
  - name: transaction_volume
    unit: USD
    aggregation: sum
    dimensions:
      - country
      - card_brand
      - currency
  - name: radar_screened_transactions
    unit: transaction
    aggregation: sum
  - name: billing_volume
    unit: USD
    aggregation: sum
  - name: tax_calculations
    unit: calculation
    aggregation: sum
  - name: subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - product
principles:
  - name: Visibility
    description: Use the Balance Transactions API and Sigma for transaction-level cost and revenue.
  - name: Allocation
    description: Tag PaymentIntents with metadata for product/team chargeback.
  - name: Optimization
    description: Negotiate IC+ pricing at scale; use Link to lift conversion; route low-risk transactions
      away from Radar premium screening.
  - name: Accountability
    description: Reconcile monthly Stripe payouts against your ledger; investigate take-rate variances.
