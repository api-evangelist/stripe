          - type: integer
        style: deepObject
      - description: 'A filter on the list based on the object `transaction_refresh` field. The value can be a dictionary with the following options:'
        explode: true
        in: query
        name: transaction_refresh
        required: false
        schema:
          properties:
            after:
              maxLength: 5000
              type: string
          required:
          - after
