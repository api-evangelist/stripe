                    type: string
                customer_balance:
                  anyOf:
                  - properties:
                      bank_transfer:
                        properties:
                          eu_bank_transfer:
                            properties:
                              country:
                                maxLength: 5000
                                type: string
                            required:
                            - country
                            title: eu_bank_transfer_param
                            type: object
                          type:
                            type: string
                        title: bank_transfer_param
                        type: object
                      funding_type:
                        type: string
                    title: invoice_payment_method_options_param
                    type: object
                  - enum:
                    - ''
                    type: string
                konbini:
                  anyOf:
                  - properties: {}
                    title: invoice_payment_method_options_param
                    type: object
                  - enum:
                    - ''
                    type: string
                us_bank_account:
                  anyOf:
                  - properties:
                      financial_connections:
                        properties:
                          permissions:
                            items:
                              enum:
                              - balances
