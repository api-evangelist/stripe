naftiko: 1.0.0-alpha2
info:
  label: Stripe Apple Pay API — Retrieve
  description: 'Stripe Apple Pay API — Retrieve. 1 operations. Lead operation: Stripe Retrieve Apple Pay Domain. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Retrieve
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: application-secrets-retrieve
    baseUri: https://api.stripe.com
    description: Stripe Apple Pay API — Retrieve business capability. Self-contained, no shared references.
    resources:
    - name: v1-apple_pay-domains-domain
      path: /v1/apple_pay/domains/{domain}
      operations:
      - name: getapplepaydomainsdomain
        method: GET
        description: Stripe Retrieve Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: application-secrets-retrieve-rest
    port: 8080
    description: REST adapter for Stripe Apple Pay API — Retrieve. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/apple-pay/domains/{domain}
      name: v1-apple-pay-domains-domain
      description: REST surface for v1-apple_pay-domains-domain.
      operations:
      - method: GET
        name: getapplepaydomainsdomain
        description: Stripe Retrieve Apple Pay Domain
        call: application-secrets-retrieve.getapplepaydomainsdomain
        with:
          domain: rest.domain
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: application-secrets-retrieve-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Apple Pay API — Retrieve. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-retrieve-apple-pay-domain
      description: Stripe Retrieve Apple Pay Domain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: application-secrets-retrieve.getapplepaydomainsdomain
      with:
        domain: tools.domain
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
