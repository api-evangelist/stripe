naftiko: 1.0.0-alpha2
info:
  label: Stripe Apple Pay API — Lists
  description: 'Stripe Apple Pay API — Lists. 1 operations. Lead operation: Stripe List Apple Pay Domains. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: apple-pay-lists
    baseUri: https://api.stripe.com
    description: Stripe Apple Pay API — Lists business capability. Self-contained, no shared references.
    resources:
    - name: v1-apple_pay-domains
      path: /v1/apple_pay/domains
      operations:
      - name: getapplepaydomains
        method: GET
        description: Stripe List Apple Pay Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain_name
          in: query
          type: string
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: apple-pay-lists-rest
    port: 8080
    description: REST adapter for Stripe Apple Pay API — Lists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/apple-pay/domains
      name: v1-apple-pay-domains
      description: REST surface for v1-apple_pay-domains.
      operations:
      - method: GET
        name: getapplepaydomains
        description: Stripe List Apple Pay Domains
        call: apple-pay-lists.getapplepaydomains
        with:
          domain_name: rest.domain_name
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apple-pay-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Apple Pay API — Lists. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-list-apple-pay-domains
      description: Stripe List Apple Pay Domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apple-pay-lists.getapplepaydomains
      with:
        domain_name: tools.domain_name
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
