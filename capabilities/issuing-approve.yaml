naftiko: 1.0.0-alpha2
info:
  label: Stripe Issuing API — Approve
  description: 'Stripe Issuing API — Approve. 1 operations. Lead operation: Stripe Post   Issuing Authorizations Approve.
    Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Approve
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuing-approve
    baseUri: https://api.stripe.com
    description: Stripe Issuing API — Approve business capability. Self-contained, no shared references.
    resources:
    - name: v1-issuing-authorizations-authorization-approve
      path: /v1/issuing/authorizations/{authorization}/approve
      operations:
      - name: postissuingauthorizationsauthorizationapprove
        method: POST
        description: Stripe Post   Issuing Authorizations Approve
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: authorization
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuing-approve-rest
    port: 8080
    description: REST adapter for Stripe Issuing API — Approve. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/issuing/authorizations/{authorization}/approve
      name: v1-issuing-authorizations-authorization-approve
      description: REST surface for v1-issuing-authorizations-authorization-approve.
      operations:
      - method: POST
        name: postissuingauthorizationsauthorizationapprove
        description: Stripe Post   Issuing Authorizations Approve
        call: issuing-approve.postissuingauthorizationsauthorizationapprove
        with:
          authorization: rest.authorization
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuing-approve-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Issuing API — Approve. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-post-issuing-authorizations-approve
      description: Stripe Post   Issuing Authorizations Approve
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-approve.postissuingauthorizationsauthorizationapprove
      with:
        authorization: tools.authorization
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
