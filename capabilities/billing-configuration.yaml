naftiko: 1.0.0-alpha2
info:
  label: Stripe Billing API — Configuration
  description: 'Stripe Billing API — Configuration. 2 operations. Lead operation: Stripe Get   Billing Portal Configurations
    Configuration. Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: billing-configuration
    baseUri: https://api.stripe.com
    description: Stripe Billing API — Configuration business capability. Self-contained, no shared references.
    resources:
    - name: v1-billing_portal-configurations-configuration
      path: /v1/billing_portal/configurations/{configuration}
      operations:
      - name: getbillingportalconfigurationsconfiguration
        method: GET
        description: Stripe Get   Billing Portal Configurations Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: configuration
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postbillingportalconfigurationsconfiguration
        method: POST
        description: Stripe Post   Billing Portal Configurations Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: configuration
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: billing-configuration-rest
    port: 8080
    description: REST adapter for Stripe Billing API — Configuration. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/billing-portal/configurations/{configuration}
      name: v1-billing-portal-configurations-configuration
      description: REST surface for v1-billing_portal-configurations-configuration.
      operations:
      - method: GET
        name: getbillingportalconfigurationsconfiguration
        description: Stripe Get   Billing Portal Configurations Configuration
        call: billing-configuration.getbillingportalconfigurationsconfiguration
        with:
          configuration: rest.configuration
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postbillingportalconfigurationsconfiguration
        description: Stripe Post   Billing Portal Configurations Configuration
        call: billing-configuration.postbillingportalconfigurationsconfiguration
        with:
          configuration: rest.configuration
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: billing-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Billing API — Configuration. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-get-billing-portal-configurations
      description: Stripe Get   Billing Portal Configurations Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: billing-configuration.getbillingportalconfigurationsconfiguration
      with:
        configuration: tools.configuration
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-billing-portal-configurations
      description: Stripe Post   Billing Portal Configurations Configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: billing-configuration.postbillingportalconfigurationsconfiguration
      with:
        configuration: tools.configuration
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
