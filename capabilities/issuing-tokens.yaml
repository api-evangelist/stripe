naftiko: 1.0.0-alpha2
info:
  label: Stripe Issuing API — Tokens
  description: 'Stripe Issuing API — Tokens. 3 operations. Lead operation: Stripe Get   Issuing Tokens. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuing-tokens
    baseUri: https://api.stripe.com
    description: Stripe Issuing API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: v1-issuing-tokens
      path: /v1/issuing/tokens
      operations:
      - name: getissuingtokens
        method: GET
        description: Stripe Get   Issuing Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card
          in: query
          type: string
          description: The Issuing card identifier to list tokens for.
          required: true
        - name: created
          in: query
          type: string
          description: Select Issuing tokens that were created during the given date interval.
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: status
          in: query
          type: string
          description: Select Issuing tokens with the given status.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-issuing-tokens-token
      path: /v1/issuing/tokens/{token}
      operations:
      - name: getissuingtokenstoken
        method: GET
        description: Stripe Get   Issuing Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: token
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingtokenstoken
        method: POST
        description: Stripe Post   Issuing Tokens
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuing-tokens-rest
    port: 8080
    description: REST adapter for Stripe Issuing API — Tokens. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/issuing/tokens
      name: v1-issuing-tokens
      description: REST surface for v1-issuing-tokens.
      operations:
      - method: GET
        name: getissuingtokens
        description: Stripe Get   Issuing Tokens
        call: issuing-tokens.getissuingtokens
        with:
          card: rest.card
          created: rest.created
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          status: rest.status
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/issuing/tokens/{token}
      name: v1-issuing-tokens-token
      description: REST surface for v1-issuing-tokens-token.
      operations:
      - method: GET
        name: getissuingtokenstoken
        description: Stripe Get   Issuing Tokens
        call: issuing-tokens.getissuingtokenstoken
        with:
          expand: rest.expand
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postissuingtokenstoken
        description: Stripe Post   Issuing Tokens
        call: issuing-tokens.postissuingtokenstoken
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuing-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Issuing API — Tokens. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-get-issuing-tokens
      description: Stripe Get   Issuing Tokens
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-tokens.getissuingtokens
      with:
        card: tools.card
        created: tools.created
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        status: tools.status
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-issuing-tokens-2
      description: Stripe Get   Issuing Tokens
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-tokens.getissuingtokenstoken
      with:
        expand: tools.expand
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-issuing-tokens
      description: Stripe Post   Issuing Tokens
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-tokens.postissuingtokenstoken
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
