naftiko: 1.0.0-alpha2
info:
  label: Stripe Disputes API — Get
  description: 'Stripe Disputes API — Get. 2 operations. Lead operation: Stripe Get   Disputes. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: disputes-get
    baseUri: https://api.stripe.com
    description: Stripe Disputes API — Get business capability. Self-contained, no shared references.
    resources:
    - name: v1-disputes
      path: /v1/disputes
      operations:
      - name: getdisputes
        method: GET
        description: Stripe Get   Disputes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: charge
          in: query
          type: string
          description: Only return disputes associated to the charge specified by this charge ID.
        - name: created
          in: query
          type: string
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: payment_intent
          in: query
          type: string
          description: Only return disputes associated to the PaymentIntent specified by this PaymentIntent ID.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-disputes-dispute
      path: /v1/disputes/{dispute}
      operations:
      - name: getdisputesdispute
        method: GET
        description: Stripe Get   Disputes Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dispute
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: disputes-get-rest
    port: 8080
    description: REST adapter for Stripe Disputes API — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/disputes
      name: v1-disputes
      description: REST surface for v1-disputes.
      operations:
      - method: GET
        name: getdisputes
        description: Stripe Get   Disputes
        call: disputes-get.getdisputes
        with:
          charge: rest.charge
          created: rest.created
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          payment_intent: rest.payment_intent
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/disputes/{dispute}
      name: v1-disputes-dispute
      description: REST surface for v1-disputes-dispute.
      operations:
      - method: GET
        name: getdisputesdispute
        description: Stripe Get   Disputes Dispute
        call: disputes-get.getdisputesdispute
        with:
          dispute: rest.dispute
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: disputes-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Disputes API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-get-disputes
      description: Stripe Get   Disputes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: disputes-get.getdisputes
      with:
        charge: tools.charge
        created: tools.created
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        payment_intent: tools.payment_intent
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-disputes-dispute
      description: Stripe Get   Disputes Dispute
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: disputes-get.getdisputesdispute
      with:
        dispute: tools.dispute
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
