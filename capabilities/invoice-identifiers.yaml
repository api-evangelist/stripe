naftiko: 1.0.0-alpha2
info:
  label: Stripe Invoice API — Identifiers
  description: 'Stripe Invoice API — Identifiers. 1 operations. Lead operation: Stripe Post   Invoices Invoice Lines Line
    Item Id. Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Identifiers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: invoice-identifiers
    baseUri: https://api.stripe.com
    description: Stripe Invoice API — Identifiers business capability. Self-contained, no shared references.
    resources:
    - name: v1-invoices-invoice-lines-line_item_id
      path: /v1/invoices/{invoice}/lines/{line_item_id}
      operations:
      - name: postinvoicesinvoicelineslineitemid
        method: POST
        description: Stripe Post   Invoices Invoice Lines Line Item Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: invoice
          in: path
          type: string
          description: Invoice ID of line item
          required: true
        - name: line_item_id
          in: path
          type: string
          description: Invoice line item ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: invoice-identifiers-rest
    port: 8080
    description: REST adapter for Stripe Invoice API — Identifiers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/invoices/{invoice}/lines/{line-item-id}
      name: v1-invoices-invoice-lines-line-item-id
      description: REST surface for v1-invoices-invoice-lines-line_item_id.
      operations:
      - method: POST
        name: postinvoicesinvoicelineslineitemid
        description: Stripe Post   Invoices Invoice Lines Line Item Id
        call: invoice-identifiers.postinvoicesinvoicelineslineitemid
        with:
          invoice: rest.invoice
          line_item_id: rest.line_item_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: invoice-identifiers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Invoice API — Identifiers. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-post-invoices-invoice-lines
      description: Stripe Post   Invoices Invoice Lines Line Item Id
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: invoice-identifiers.postinvoicesinvoicelineslineitemid
      with:
        invoice: tools.invoice
        line_item_id: tools.line_item_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
