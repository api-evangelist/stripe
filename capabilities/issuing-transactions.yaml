naftiko: 1.0.0-alpha2
info:
  label: Stripe Issuing API — Transactions
  description: 'Stripe Issuing API — Transactions. 3 operations. Lead operation: Stripe Get   Issuing Transactions. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Transactions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuing-transactions
    baseUri: https://api.stripe.com
    description: Stripe Issuing API — Transactions business capability. Self-contained, no shared references.
    resources:
    - name: v1-issuing-transactions
      path: /v1/issuing/transactions
      operations:
      - name: getissuingtransactions
        method: GET
        description: Stripe Get   Issuing Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card
          in: query
          type: string
          description: Only return transactions that belong to the given card.
        - name: cardholder
          in: query
          type: string
          description: Only return transactions that belong to the given cardholder.
        - name: created
          in: query
          type: string
          description: Only return transactions that were created during the given date interval.
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: type
          in: query
          type: string
          description: Only return transactions that have the given type. One of `capture` or `refund`.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-issuing-transactions-transaction
      path: /v1/issuing/transactions/{transaction}
      operations:
      - name: getissuingtransactionstransaction
        method: GET
        description: Stripe Get   Issuing Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: transaction
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingtransactionstransaction
        method: POST
        description: Stripe Post   Issuing Transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: transaction
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuing-transactions-rest
    port: 8080
    description: REST adapter for Stripe Issuing API — Transactions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/issuing/transactions
      name: v1-issuing-transactions
      description: REST surface for v1-issuing-transactions.
      operations:
      - method: GET
        name: getissuingtransactions
        description: Stripe Get   Issuing Transactions
        call: issuing-transactions.getissuingtransactions
        with:
          card: rest.card
          cardholder: rest.cardholder
          created: rest.created
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          type: rest.type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/issuing/transactions/{transaction}
      name: v1-issuing-transactions-transaction
      description: REST surface for v1-issuing-transactions-transaction.
      operations:
      - method: GET
        name: getissuingtransactionstransaction
        description: Stripe Get   Issuing Transactions
        call: issuing-transactions.getissuingtransactionstransaction
        with:
          expand: rest.expand
          transaction: rest.transaction
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postissuingtransactionstransaction
        description: Stripe Post   Issuing Transactions
        call: issuing-transactions.postissuingtransactionstransaction
        with:
          transaction: rest.transaction
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuing-transactions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Issuing API — Transactions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-get-issuing-transactions
      description: Stripe Get   Issuing Transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-transactions.getissuingtransactions
      with:
        card: tools.card
        cardholder: tools.cardholder
        created: tools.created
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        type: tools.type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-issuing-transactions-2
      description: Stripe Get   Issuing Transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-transactions.getissuingtransactionstransaction
      with:
        expand: tools.expand
        transaction: tools.transaction
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-issuing-transactions
      description: Stripe Post   Issuing Transactions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-transactions.postissuingtransactionstransaction
      with:
        transaction: tools.transaction
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
