  description: 'Stripe Events API — Events. 2 operations. Lead operation: Stripe Get   Events. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
