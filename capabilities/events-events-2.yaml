    resources:
    - path: /v1/v1/events
      name: v1-events
      description: REST surface for v1-events.
      operations:
      - method: GET
        name: getevents
        description: Stripe Get   Events
        call: events-events-2.getevents
        with:
          created: rest.created
          delivery_success: rest.delivery_success
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          type: rest.type
          types: rest.types
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
