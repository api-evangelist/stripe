    description: Stripe Events API — Events business capability. Self-contained, no shared references.
    resources:
    - name: v1-events
      path: /v1/events
      operations:
      - name: getevents
        method: GET
        description: Stripe Get   Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: created
          in: query
          type: string
        - name: delivery_success
          in: query
          type: boolean
          description: Filter events by whether all webhooks were successfully delivered. If false, events which are still
            pending or have failed all delivery attempts to a webhook en
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: type
          in: query
          type: string
          description: A string containing a specific event name, or group of events using * as a wildcard. The list will
            be filtered to include only events with a matching event prop
        - name: types
          in: query
          type: array
          description: An array of up to 20 strings containing specific event names. The list will be filtered to include
            only events with a matching event property. You may pass eith
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-events-id
      path: /v1/events/{id}
      operations:
      - name: geteventsid
        method: GET
        description: Stripe Get   Events Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: events-events-2-rest
    port: 8080
    description: REST adapter for Stripe Events API — Events. One Spectral-compliant resource per consumed operation, prefixed
