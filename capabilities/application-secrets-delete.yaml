naftiko: 1.0.0-alpha2
info:
  label: Stripe Apple Pay API — Delete
  description: 'Stripe Apple Pay API — Delete. 1 operations. Lead operation: Stripe Delete Apple Pay Domain. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: application-secrets-delete
    baseUri: https://api.stripe.com
    description: Stripe Apple Pay API — Delete business capability. Self-contained, no shared references.
    resources:
    - name: v1-apple_pay-domains-domain
      path: /v1/apple_pay/domains/{domain}
      operations:
      - name: deleteapplepaydomainsdomain
        method: DELETE
        description: Stripe Delete Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: application-secrets-delete-rest
    port: 8080
    description: REST adapter for Stripe Apple Pay API — Delete. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/apple-pay/domains/{domain}
      name: v1-apple-pay-domains-domain
      description: REST surface for v1-apple_pay-domains-domain.
      operations:
      - method: DELETE
        name: deleteapplepaydomainsdomain
        description: Stripe Delete Apple Pay Domain
        call: application-secrets-delete.deleteapplepaydomainsdomain
        with:
          domain: rest.domain
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: application-secrets-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Apple Pay API — Delete. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-delete-apple-pay-domain
      description: Stripe Delete Apple Pay Domain
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: application-secrets-delete.deleteapplepaydomainsdomain
      with:
        domain: tools.domain
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
