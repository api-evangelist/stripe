naftiko: 1.0.0-alpha2
info:
  label: Stripe Disputes API — Post
  description: 'Stripe Disputes API — Post. 2 operations. Lead operation: Stripe Post   Disputes Dispute. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Post
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: disputes-post
    baseUri: https://api.stripe.com
    description: Stripe Disputes API — Post business capability. Self-contained, no shared references.
    resources:
    - name: v1-disputes-dispute
      path: /v1/disputes/{dispute}
      operations:
      - name: postdisputesdispute
        method: POST
        description: Stripe Post   Disputes Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dispute
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-disputes-dispute-close
      path: /v1/disputes/{dispute}/close
      operations:
      - name: postdisputesdisputeclose
        method: POST
        description: Stripe Post   Disputes Dispute Close
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dispute
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: disputes-post-rest
    port: 8080
    description: REST adapter for Stripe Disputes API — Post. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/disputes/{dispute}
      name: v1-disputes-dispute
      description: REST surface for v1-disputes-dispute.
      operations:
      - method: POST
        name: postdisputesdispute
        description: Stripe Post   Disputes Dispute
        call: disputes-post.postdisputesdispute
        with:
          dispute: rest.dispute
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/disputes/{dispute}/close
      name: v1-disputes-dispute-close
      description: REST surface for v1-disputes-dispute-close.
      operations:
      - method: POST
        name: postdisputesdisputeclose
        description: Stripe Post   Disputes Dispute Close
        call: disputes-post.postdisputesdisputeclose
        with:
          dispute: rest.dispute
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: disputes-post-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Disputes API — Post. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-post-disputes-dispute
      description: Stripe Post   Disputes Dispute
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: disputes-post.postdisputesdispute
      with:
        dispute: tools.dispute
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-disputes-dispute-close
      description: Stripe Post   Disputes Dispute Close
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: disputes-post.postdisputesdisputeclose
      with:
        dispute: tools.dispute
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
