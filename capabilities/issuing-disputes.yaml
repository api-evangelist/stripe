        - name: transaction
          in: query
          type: string
          description: Select the Issuing dispute for the given transaction.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingdisputes
        method: POST
        description: Stripe Post   Issuing Disputes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
