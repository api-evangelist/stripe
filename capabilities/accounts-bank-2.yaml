naftiko: 1.0.0-alpha2
info:
  label: Stripe Accounts API — Bank
  description: 'Stripe Accounts API — Bank. 4 operations. Lead operation: Stripe Create Bank Account. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Bank
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-bank-2
    baseUri: https://api.stripe.com
    description: Stripe Accounts API — Bank business capability. Self-contained, no shared references.
    resources:
    - name: v1-accounts-account-bank_accounts
      path: /v1/accounts/{account}/bank_accounts
      operations:
      - name: postaccountsaccountbankaccounts
        method: POST
        description: Stripe Create Bank Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-accounts-account-bank_accounts-id
      path: /v1/accounts/{account}/bank_accounts/{id}
      operations:
      - name: deleteaccountsaccountbankaccountsid
        method: DELETE
        description: Stripe Delete Bank Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getaccountsaccountbankaccountsid
        method: GET
        description: Stripe Retrieve Bank Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postaccountsaccountbankaccountsid
        method: POST
        description: Stripe Update Bank Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: accounts-bank-2-rest
    port: 8080
    description: REST adapter for Stripe Accounts API — Bank. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/accounts/{account}/bank-accounts
      name: v1-accounts-account-bank-accounts
      description: REST surface for v1-accounts-account-bank_accounts.
      operations:
      - method: POST
        name: postaccountsaccountbankaccounts
        description: Stripe Create Bank Account
        call: accounts-bank-2.postaccountsaccountbankaccounts
        with:
          account: rest.account
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accounts/{account}/bank-accounts/{id}
      name: v1-accounts-account-bank-accounts-id
      description: REST surface for v1-accounts-account-bank_accounts-id.
      operations:
      - method: DELETE
        name: deleteaccountsaccountbankaccountsid
        description: Stripe Delete Bank Account
        call: accounts-bank-2.deleteaccountsaccountbankaccountsid
        with:
          account: rest.account
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getaccountsaccountbankaccountsid
        description: Stripe Retrieve Bank Account
        call: accounts-bank-2.getaccountsaccountbankaccountsid
        with:
          account: rest.account
          expand: rest.expand
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postaccountsaccountbankaccountsid
        description: Stripe Update Bank Account
        call: accounts-bank-2.postaccountsaccountbankaccountsid
        with:
          account: rest.account
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-bank-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Accounts API — Bank. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-create-bank-account
      description: Stripe Create Bank Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-bank-2.postaccountsaccountbankaccounts
      with:
        account: tools.account
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-delete-bank-account
      description: Stripe Delete Bank Account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: accounts-bank-2.deleteaccountsaccountbankaccountsid
      with:
        account: tools.account
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-retrieve-bank-account
      description: Stripe Retrieve Bank Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-bank-2.getaccountsaccountbankaccountsid
      with:
        account: tools.account
        expand: tools.expand
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-update-bank-account
      description: Stripe Update Bank Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-bank-2.postaccountsaccountbankaccountsid
      with:
        account: tools.account
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
