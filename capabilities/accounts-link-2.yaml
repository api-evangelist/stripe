naftiko: 1.0.0-alpha2
info:
  label: Stripe Accounts API — Link
  description: 'Stripe Accounts API — Link. 2 operations. Lead operation: Stripe Create Account Link. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Link
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-link-2
    baseUri: https://api.stripe.com
    description: Stripe Accounts API — Link business capability. Self-contained, no shared references.
    resources:
    - name: v1-account_links
      path: /v1/account_links
      operations:
      - name: postaccountlinks
        method: POST
        description: Stripe Create Account Link
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-accounts-account-login_links
      path: /v1/accounts/{account}/login_links
      operations:
      - name: postaccountsaccountloginlinks
        method: POST
        description: Stripe Create Login Link
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: accounts-link-2-rest
    port: 8080
    description: REST adapter for Stripe Accounts API — Link. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/account-links
      name: v1-account-links
      description: REST surface for v1-account_links.
      operations:
      - method: POST
        name: postaccountlinks
        description: Stripe Create Account Link
        call: accounts-link-2.postaccountlinks
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/accounts/{account}/login-links
      name: v1-accounts-account-login-links
      description: REST surface for v1-accounts-account-login_links.
      operations:
      - method: POST
        name: postaccountsaccountloginlinks
        description: Stripe Create Login Link
        call: accounts-link-2.postaccountsaccountloginlinks
        with:
          account: rest.account
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-link-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Accounts API — Link. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-create-account-link
      description: Stripe Create Account Link
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-link-2.postaccountlinks
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-create-login-link
      description: Stripe Create Login Link
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-link-2.postaccountsaccountloginlinks
      with:
        account: tools.account
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
