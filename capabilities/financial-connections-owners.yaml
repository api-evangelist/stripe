    description: Stripe Financial Connections API — Owners business capability. Self-contained, no shared references.
    resources:
    - name: v1-financial_connections-accounts-account-owners
      path: /v1/financial_connections/accounts/{account}/owners
      operations:
      - name: getfinancialconnectionsaccountsaccountowners
        method: GET
        description: Stripe Get   Financial Connections Accounts Owners
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: ownership
          in: query
          type: string
          description: The ID of the ownership object to fetch owners from.
          required: true
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-connections-owners-rest
    port: 8080
    description: REST adapter for Stripe Financial Connections API — Owners. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/financial-connections/accounts/{account}/owners
      name: v1-financial-connections-accounts-account-owners
      description: REST surface for v1-financial_connections-accounts-account-owners.
      operations:
      - method: GET
        name: getfinancialconnectionsaccountsaccountowners
        description: Stripe Get   Financial Connections Accounts Owners
        call: financial-connections-owners.getfinancialconnectionsaccountsaccountowners
        with:
          account: rest.account
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          ownership: rest.ownership
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-connections-owners-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Financial Connections API — Owners. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: stripe-get-financial-connections-accounts
      description: Stripe Get   Financial Connections Accounts Owners
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-connections-owners.getfinancialconnectionsaccountsaccountowners
      with:
        account: tools.account
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        ownership: tools.ownership
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
