  description: 'Stripe Financial Connections API — Owners. 1 operations. Lead operation: Stripe Get   Financial Connections
    Accounts Owners. Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Owners
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
