naftiko: 1.0.0-alpha2
info:
  label: Stripe Plans API — Get
  description: 'Stripe Plans API — Get. 2 operations. Lead operation: Stripe Get   Plans. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: plans-get
    baseUri: https://api.stripe.com
    description: Stripe Plans API — Get business capability. Self-contained, no shared references.
    resources:
    - name: v1-plans
      path: /v1/plans
      operations:
      - name: getplans
        method: GET
        description: Stripe Get   Plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: active
          in: query
          type: boolean
          description: Only return plans that are active or inactive (e.g., pass `false` to list all inactive plans).
        - name: created
          in: query
          type: string
          description: 'A filter on the list, based on the object `created` field. The value can be a string with an integer
            Unix timestamp, or it can be a dictionary with a number of '
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: product
          in: query
          type: string
          description: Only return plans for the given product.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-plans-plan
      path: /v1/plans/{plan}
      operations:
      - name: getplansplan
        method: GET
        description: Stripe Get   Plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: plan
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: plans-get-rest
    port: 8080
    description: REST adapter for Stripe Plans API — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/plans
      name: v1-plans
      description: REST surface for v1-plans.
      operations:
      - method: GET
        name: getplans
        description: Stripe Get   Plans
        call: plans-get.getplans
        with:
          active: rest.active
          created: rest.created
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          product: rest.product
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/plans/{plan}
      name: v1-plans-plan
      description: REST surface for v1-plans-plan.
      operations:
      - method: GET
        name: getplansplan
        description: Stripe Get   Plans
        call: plans-get.getplansplan
        with:
          expand: rest.expand
          plan: rest.plan
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: plans-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Plans API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-get-plans
      description: Stripe Get   Plans
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: plans-get.getplans
      with:
        active: tools.active
        created: tools.created
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        product: tools.product
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-plans-2
      description: Stripe Get   Plans
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: plans-get.getplansplan
      with:
        expand: tools.expand
        plan: tools.plan
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
