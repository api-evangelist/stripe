naftiko: 1.0.0-alpha2
info:
  label: Stripe Invoice API — Pay
  description: 'Stripe Invoice API — Pay. 1 operations. Lead operation: Stripe Post   Invoices Invoice Pay. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Pay
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: invoice-pay
    baseUri: https://api.stripe.com
    description: Stripe Invoice API — Pay business capability. Self-contained, no shared references.
    resources:
    - name: v1-invoices-invoice-pay
      path: /v1/invoices/{invoice}/pay
      operations:
      - name: postinvoicesinvoicepay
        method: POST
        description: Stripe Post   Invoices Invoice Pay
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: invoice
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: invoice-pay-rest
    port: 8080
    description: REST adapter for Stripe Invoice API — Pay. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/invoices/{invoice}/pay
      name: v1-invoices-invoice-pay
      description: REST surface for v1-invoices-invoice-pay.
      operations:
      - method: POST
        name: postinvoicesinvoicepay
        description: Stripe Post   Invoices Invoice Pay
        call: invoice-pay.postinvoicesinvoicepay
        with:
          invoice: rest.invoice
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: invoice-pay-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Invoice API — Pay. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-post-invoices-invoice-pay
      description: Stripe Post   Invoices Invoice Pay
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: invoice-pay.postinvoicesinvoicepay
      with:
        invoice: tools.invoice
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
