naftiko: 1.0.0-alpha2
info:
  label: Stripe Apple Pay API — Domain
  description: 'Stripe Apple Pay API — Domain. 3 operations. Lead operation: Stripe Create Apple Pay Domain. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Domain
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: apple-pay-domain
    baseUri: https://api.stripe.com
    description: Stripe Apple Pay API — Domain business capability. Self-contained, no shared references.
    resources:
    - name: v1-apple_pay-domains
      path: /v1/apple_pay/domains
      operations:
      - name: postapplepaydomains
        method: POST
        description: Stripe Create Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-apple_pay-domains-domain
      path: /v1/apple_pay/domains/{domain}
      operations:
      - name: deleteapplepaydomainsdomain
        method: DELETE
        description: Stripe Delete Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getapplepaydomainsdomain
        method: GET
        description: Stripe Retrieve Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: apple-pay-domain-rest
    port: 8080
    description: REST adapter for Stripe Apple Pay API — Domain. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/apple-pay/domains
      name: v1-apple-pay-domains
      description: REST surface for v1-apple_pay-domains.
      operations:
      - method: POST
        name: postapplepaydomains
        description: Stripe Create Apple Pay Domain
        call: apple-pay-domain.postapplepaydomains
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/apple-pay/domains/{domain}
      name: v1-apple-pay-domains-domain
      description: REST surface for v1-apple_pay-domains-domain.
      operations:
      - method: DELETE
        name: deleteapplepaydomainsdomain
        description: Stripe Delete Apple Pay Domain
        call: apple-pay-domain.deleteapplepaydomainsdomain
        with:
          domain: rest.domain
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getapplepaydomainsdomain
        description: Stripe Retrieve Apple Pay Domain
        call: apple-pay-domain.getapplepaydomainsdomain
        with:
          domain: rest.domain
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apple-pay-domain-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Apple Pay API — Domain. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-create-apple-pay-domain
      description: Stripe Create Apple Pay Domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apple-pay-domain.postapplepaydomains
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-delete-apple-pay-domain
      description: Stripe Delete Apple Pay Domain
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: apple-pay-domain.deleteapplepaydomainsdomain
      with:
        domain: tools.domain
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-retrieve-apple-pay-domain
      description: Stripe Retrieve Apple Pay Domain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apple-pay-domain.getapplepaydomainsdomain
      with:
        domain: tools.domain
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
