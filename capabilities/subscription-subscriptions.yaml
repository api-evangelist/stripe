naftiko: 1.0.0-alpha2
info:
  label: Stripe Subscription API — Subscriptions
  description: 'Stripe Subscription API — Subscriptions. 8 operations. Lead operation: Subscriptions. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: subscription-subscriptions
    baseUri: https://api.stripe.com
    description: Stripe Subscription API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: v1-subscriptions
      path: /v1/subscriptions
      operations:
      - name: getsubscriptions
        method: GET
        description: <p>By default, returns a list of subscriptions that have not been canceled. In order to list canceled
          subscriptions, specify <code>status=canceled</code>.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: automatic_tax
          in: query
          type: object
          description: Filter subscriptions by their automatic tax settings.
        - name: collection_method
          in: query
          type: string
          description: The collection method of the subscriptions to retrieve. Either `charge_automatically` or `send_invoice`.
        - name: created
          in: query
          type: string
        - name: current_period_end
          in: query
          type: string
        - name: current_period_start
          in: query
          type: string
        - name: customer
          in: query
          type: string
          description: The ID of the customer whose subscriptions will be retrieved.
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: price
          in: query
          type: string
          description: Filter for subscriptions that contain this recurring price ID.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: status
          in: query
          type: string
          description: The status of the subscriptions to retrieve. Passing in a value of `canceled` will return all canceled
            subscriptions, including those belonging to deleted custo
        - name: test_clock
          in: query
          type: string
          description: Filter for subscriptions that are associated with the specified test clock. The response will not include
            subscriptions with test clocks if this and the custome
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postsubscriptions
        method: POST
        description: <p>Creates a new subscription on an existing customer. Each customer can have up to 500 active or scheduled
          subscriptions.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-subscriptions-search
      path: /v1/subscriptions/search
      operations:
      - name: getsubscriptionssearch
        method: GET
        description: <p>Search for subscriptions you’ve previously created using Stripe’s <a href="/docs/search#search-query-language">Search
          Query Language</a>.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: page
          in: query
          type: string
          description: A cursor for pagination across multiple pages of results. Don't include this parameter on the first
            call. Use the next_page value returned in a previous respons
        - name: query
          in: query
          type: string
          description: The search query string. See [search query language](https://stripe.com/docs/search#search-query-language)
            and the list of supported [query fields for subscript
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-subscriptions-subscription_exposed_id
      path: /v1/subscriptions/{subscription_exposed_id}
      operations:
      - name: deletesubscriptionssubscriptionexposedid
        method: DELETE
        description: <p>Cancels a customer’s subscription immediately. The customer will not be charged again for the subscription.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription_exposed_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getsubscriptionssubscriptionexposedid
        method: GET
        description: <p>Retrieves the subscription with the given ID.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: subscription_exposed_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postsubscriptionssubscriptionexposedid
        method: POST
        description: <p>Updates an existing subscription to match the specified parameters.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription_exposed_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-subscriptions-subscription_exposed_id-discount
      path: /v1/subscriptions/{subscription_exposed_id}/discount
      operations:
      - name: deletesubscriptionssubscriptionexposediddiscount
        method: DELETE
        description: <p>Removes the currently applied discount on a subscription.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription_exposed_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-subscriptions-subscription-resume
      path: /v1/subscriptions/{subscription}/resume
      operations:
      - name: postsubscriptionssubscriptionresume
        method: POST
        description: <p>Initiates resumption of a paused subscription, optionally resetting the billing cycle anchor and creating
          prorations. If a resumption invoice is generated, it must be paid or marked uncollectible before the subscription
          will be unpaused.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
