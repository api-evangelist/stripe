        name: deletesubscriptionssubscriptionexposediddiscount
        description: <p>Removes the currently applied discount on a subscription.</p>
        call: subscription-subscriptions.deletesubscriptionssubscriptionexposediddiscount
        with:
          subscription_exposed_id: rest.subscription_exposed_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/subscriptions/{subscription}/resume
      name: v1-subscriptions-subscription-resume
