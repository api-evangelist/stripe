naftiko: 1.0.0-alpha2
info:
  label: Stripe Payment Links API — Line
  description: 'Stripe Payment Links API — Line. 1 operations. Lead operation: Stripe Get   Payment Links Line Items. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Line
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: payment-links-line
    baseUri: https://api.stripe.com
    description: Stripe Payment Links API — Line business capability. Self-contained, no shared references.
    resources:
    - name: v1-payment_links-payment_link-line_items
      path: /v1/payment_links/{payment_link}/line_items
      operations:
      - name: getpaymentlinkspaymentlinklineitems
        method: GET
        description: Stripe Get   Payment Links Line Items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: payment_link
          in: path
          type: string
          required: true
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: payment-links-line-rest
    port: 8080
    description: REST adapter for Stripe Payment Links API — Line. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/payment-links/{payment-link}/line-items
      name: v1-payment-links-payment-link-line-items
      description: REST surface for v1-payment_links-payment_link-line_items.
      operations:
      - method: GET
        name: getpaymentlinkspaymentlinklineitems
        description: Stripe Get   Payment Links Line Items
        call: payment-links-line.getpaymentlinkspaymentlinklineitems
        with:
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          payment_link: rest.payment_link
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payment-links-line-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Payment Links API — Line. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-get-payment-links-line
      description: Stripe Get   Payment Links Line Items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payment-links-line.getpaymentlinkspaymentlinklineitems
      with:
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        payment_link: tools.payment_link
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
