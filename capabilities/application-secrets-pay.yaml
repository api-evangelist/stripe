naftiko: 1.0.0-alpha2
info:
  label: Stripe Apple Pay API — Pay
  description: 'Stripe Apple Pay API — Pay. 4 operations. Lead operation: Stripe List Apple Pay Domains. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Pay
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: application-secrets-pay
    baseUri: https://api.stripe.com
    description: Stripe Apple Pay API — Pay business capability. Self-contained, no shared references.
    resources:
    - name: v1-apple_pay-domains
      path: /v1/apple_pay/domains
      operations:
      - name: getapplepaydomains
        method: GET
        description: Stripe List Apple Pay Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain_name
          in: query
          type: string
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postapplepaydomains
        method: POST
        description: Stripe Create Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-apple_pay-domains-domain
      path: /v1/apple_pay/domains/{domain}
      operations:
      - name: deleteapplepaydomainsdomain
        method: DELETE
        description: Stripe Delete Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getapplepaydomainsdomain
        method: GET
        description: Stripe Retrieve Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: application-secrets-pay-rest
    port: 8080
    description: REST adapter for Stripe Apple Pay API — Pay. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/apple-pay/domains
      name: v1-apple-pay-domains
      description: REST surface for v1-apple_pay-domains.
      operations:
      - method: GET
        name: getapplepaydomains
        description: Stripe List Apple Pay Domains
        call: application-secrets-pay.getapplepaydomains
        with:
          domain_name: rest.domain_name
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postapplepaydomains
        description: Stripe Create Apple Pay Domain
        call: application-secrets-pay.postapplepaydomains
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/apple-pay/domains/{domain}
      name: v1-apple-pay-domains-domain
      description: REST surface for v1-apple_pay-domains-domain.
      operations:
      - method: DELETE
        name: deleteapplepaydomainsdomain
        description: Stripe Delete Apple Pay Domain
        call: application-secrets-pay.deleteapplepaydomainsdomain
        with:
          domain: rest.domain
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getapplepaydomainsdomain
        description: Stripe Retrieve Apple Pay Domain
        call: application-secrets-pay.getapplepaydomainsdomain
        with:
          domain: rest.domain
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: application-secrets-pay-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Apple Pay API — Pay. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-list-apple-pay-domains
      description: Stripe List Apple Pay Domains
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: application-secrets-pay.getapplepaydomains
      with:
        domain_name: tools.domain_name
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-create-apple-pay-domain
      description: Stripe Create Apple Pay Domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: application-secrets-pay.postapplepaydomains
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-delete-apple-pay-domain
      description: Stripe Delete Apple Pay Domain
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: application-secrets-pay.deleteapplepaydomainsdomain
      with:
        domain: tools.domain
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-retrieve-apple-pay-domain
      description: Stripe Retrieve Apple Pay Domain
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: application-secrets-pay.getapplepaydomainsdomain
      with:
        domain: tools.domain
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
