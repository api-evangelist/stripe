naftiko: 1.0.0-alpha2
info:
  label: Stripe Issuing API — Cards
  description: 'Stripe Issuing API — Cards. 4 operations. Lead operation: Stripe Get   Issuing Cards. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Cards
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuing-cards
    baseUri: https://api.stripe.com
    description: Stripe Issuing API — Cards business capability. Self-contained, no shared references.
    resources:
    - name: v1-issuing-cards
      path: /v1/issuing/cards
      operations:
      - name: getissuingcards
        method: GET
        description: Stripe Get   Issuing Cards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cardholder
          in: query
          type: string
          description: Only return cards belonging to the Cardholder with the provided ID.
        - name: created
          in: query
          type: string
          description: Only return cards that were issued during the given date interval.
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: exp_month
          in: query
          type: integer
          description: Only return cards that have the given expiration month.
        - name: exp_year
          in: query
          type: integer
          description: Only return cards that have the given expiration year.
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: last4
          in: query
          type: string
          description: Only return cards that have the given last four digits.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: status
          in: query
          type: string
          description: Only return cards that have the given status. One of `active`, `inactive`, or `canceled`.
        - name: type
          in: query
          type: string
          description: Only return cards that have the given type. One of `virtual` or `physical`.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingcards
        method: POST
        description: Stripe Post   Issuing Cards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-issuing-cards-card
      path: /v1/issuing/cards/{card}
      operations:
      - name: getissuingcardscard
        method: GET
        description: Stripe Get   Issuing Cards Card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingcardscard
        method: POST
        description: Stripe Post   Issuing Cards Card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuing-cards-rest
    port: 8080
    description: REST adapter for Stripe Issuing API — Cards. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/issuing/cards
      name: v1-issuing-cards
      description: REST surface for v1-issuing-cards.
      operations:
      - method: GET
        name: getissuingcards
        description: Stripe Get   Issuing Cards
        call: issuing-cards.getissuingcards
        with:
          cardholder: rest.cardholder
          created: rest.created
          ending_before: rest.ending_before
          exp_month: rest.exp_month
          exp_year: rest.exp_year
          expand: rest.expand
          last4: rest.last4
          limit: rest.limit
          starting_after: rest.starting_after
          status: rest.status
          type: rest.type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postissuingcards
        description: Stripe Post   Issuing Cards
        call: issuing-cards.postissuingcards
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/issuing/cards/{card}
      name: v1-issuing-cards-card
      description: REST surface for v1-issuing-cards-card.
      operations:
      - method: GET
        name: getissuingcardscard
        description: Stripe Get   Issuing Cards Card
        call: issuing-cards.getissuingcardscard
        with:
          card: rest.card
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postissuingcardscard
        description: Stripe Post   Issuing Cards Card
        call: issuing-cards.postissuingcardscard
        with:
          card: rest.card
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuing-cards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Issuing API — Cards. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-get-issuing-cards
      description: Stripe Get   Issuing Cards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-cards.getissuingcards
      with:
        cardholder: tools.cardholder
        created: tools.created
        ending_before: tools.ending_before
        exp_month: tools.exp_month
        exp_year: tools.exp_year
        expand: tools.expand
        last4: tools.last4
        limit: tools.limit
        starting_after: tools.starting_after
        status: tools.status
        type: tools.type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-issuing-cards
      description: Stripe Post   Issuing Cards
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-cards.postissuingcards
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-issuing-cards-card
      description: Stripe Get   Issuing Cards Card
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-cards.getissuingcardscard
      with:
        card: tools.card
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-issuing-cards-card
      description: Stripe Post   Issuing Cards Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-cards.postissuingcardscard
      with:
        card: tools.card
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
