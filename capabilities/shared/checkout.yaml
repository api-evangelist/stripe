naftiko: "1.0.0-alpha1"

info:
  label: "Stripe Checkout API"
  description: >-
    Stripe Checkout creates a hosted or embedded payment form for collecting payments.
    Supports creating sessions, listing sessions, expiring sessions, and retrieving line items.
  tags:
    - Stripe
    - Checkout
    - Payments
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STRIPE_API_KEY: STRIPE_API_KEY

capability:
  consumes:
    - type: http
      namespace: stripe-checkout
      baseUri: https://api.stripe.com
      description: "Stripe Checkout API for hosted and embedded payment pages."
      authentication:
        type: bearer
        token: "{{STRIPE_API_KEY}}"
      resources:
        - name: checkout-sessions
          path: /v1/checkout/sessions
          description: "Checkout session collection"
          operations:
            - name: list-checkout-sessions
              method: GET
              description: "List all checkout sessions"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-checkout-session
              method: POST
              description: "Create a new checkout session"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  success_url: "{{tools.success_url}}"
                  cancel_url: "{{tools.cancel_url}}"
                  mode: "{{tools.mode}}"

        - name: checkout-session
          path: /v1/checkout/sessions/{session}
          description: "Individual checkout session"
          operations:
            - name: get-checkout-session
              method: GET
              description: "Retrieve a checkout session by ID"
              inputParameters:
                - name: session
                  in: path
                  type: string
                  required: true
                  description: "Checkout session ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: checkout-session-expire
          path: /v1/checkout/sessions/{session}/expire
          description: "Expire a checkout session"
          operations:
            - name: expire-checkout-session
              method: POST
              description: "Expire a checkout session before it naturally expires"
              inputParameters:
                - name: session
                  in: path
                  type: string
                  required: true
                  description: "Checkout session ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: checkout-session-line-items
          path: /v1/checkout/sessions/{session}/line_items
          description: "Line items for a checkout session"
          operations:
            - name: list-checkout-session-line-items
              method: GET
              description: "List line items for a checkout session"
              inputParameters:
                - name: session
                  in: path
                  type: string
                  required: true
                  description: "Checkout session ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: stripe-checkout-rest
      resources:
        - path: /v1/checkout-sessions
          name: checkout-sessions
          operations:
            - method: GET
              name: list-checkout-sessions
              description: "List checkout sessions"
              call: "stripe-checkout.list-checkout-sessions"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-checkout-session
              description: "Create a checkout session"
              call: "stripe-checkout.create-checkout-session"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/checkout-sessions/{session}
          name: checkout-session
          operations:
            - method: GET
              name: get-checkout-session
              description: "Get a checkout session"
              call: "stripe-checkout.get-checkout-session"
              with:
                session: "rest.session"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: stripe-checkout-mcp
      transport: http
      tools:
        - name: list-checkout-sessions
          description: "List Stripe checkout sessions"
          hints:
            readOnly: true
          call: "stripe-checkout.list-checkout-sessions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-checkout-session
          description: "Create a Stripe hosted checkout session"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-checkout.create-checkout-session"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-checkout-session
          description: "Retrieve a checkout session by ID"
          hints:
            readOnly: true
          call: "stripe-checkout.get-checkout-session"
          with:
            session: "tools.session"
          outputParameters:
            - type: object
              mapping: "$."
        - name: expire-checkout-session
          description: "Expire an active checkout session"
          hints:
            readOnly: false
            destructive: true
          call: "stripe-checkout.expire-checkout-session"
          with:
            session: "tools.session"
          outputParameters:
            - type: object
              mapping: "$."
