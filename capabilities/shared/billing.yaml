naftiko: "1.0.0-alpha1"

info:
  label: "Stripe Billing API"
  description: >-
    Stripe Billing Portal allows customers to manage their own subscriptions, payment methods,
    and billing information through a hosted portal. Supports configurations and session creation.
  tags:
    - Stripe
    - Billing
    - Subscriptions
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STRIPE_API_KEY: STRIPE_API_KEY

capability:
  consumes:
    - type: http
      namespace: stripe-billing
      baseUri: https://api.stripe.com
      description: "Stripe Billing Portal API for customer self-service subscription management."
      authentication:
        type: bearer
        token: "{{STRIPE_API_KEY}}"
      resources:
        - name: billing-portal-configurations
          path: /v1/billing_portal/configurations
          description: "Portal configuration management"
          operations:
            - name: list-portal-configurations
              method: GET
              description: "List billing portal configurations"
              inputParameters:
                - name: active
                  in: query
                  type: boolean
                  required: false
                  description: "Filter active or inactive configurations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-portal-configuration
              method: POST
              description: "Create a billing portal configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: billing-portal-sessions
          path: /v1/billing_portal/sessions
          description: "Portal session management"
          operations:
            - name: create-portal-session
              method: POST
              description: "Create a billing portal session for a customer"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  customer: "{{tools.customer}}"
                  return_url: "{{tools.return_url}}"

  exposes:
    - type: rest
      port: 8103
      namespace: stripe-billing-rest
      resources:
        - path: /v1/billing-portal-configurations
          name: portal-configurations
          operations:
            - method: GET
              name: list-portal-configurations
              description: "List portal configurations"
              call: "stripe-billing.list-portal-configurations"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/billing-portal-sessions
          name: portal-sessions
          operations:
            - method: POST
              name: create-portal-session
              description: "Create a billing portal session"
              call: "stripe-billing.create-portal-session"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: stripe-billing-mcp
      transport: http
      tools:
        - name: list-portal-configurations
          description: "List Stripe billing portal configurations"
          hints:
            readOnly: true
          call: "stripe-billing.list-portal-configurations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-portal-configuration
          description: "Create a Stripe billing portal configuration"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-billing.create-portal-configuration"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-portal-session
          description: "Create a Stripe billing portal session for a customer to manage their subscription"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-billing.create-portal-session"
          outputParameters:
            - type: object
              mapping: "$."
