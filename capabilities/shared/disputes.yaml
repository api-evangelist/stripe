naftiko: "1.0.0-alpha1"

info:
  label: "Stripe Disputes API"
  description: >-
    Manage payment disputes (chargebacks) on Stripe. Retrieve disputes, update dispute evidence,
    and close disputes.
  tags:
    - Stripe
    - Disputes
    - Risk Management
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STRIPE_API_KEY: STRIPE_API_KEY

capability:
  consumes:
    - type: http
      namespace: stripe-disputes
      baseUri: https://api.stripe.com
      description: "Stripe Disputes API for managing chargebacks."
      authentication:
        type: bearer
        token: "{{STRIPE_API_KEY}}"
      resources:
        - name: disputes
          path: /v1/disputes
          description: "Dispute collection"
          operations:
            - name: list-disputes
              method: GET
              description: "List all disputes"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
                - name: charge
                  in: query
                  type: string
                  required: false
                  description: "Filter by charge ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dispute
          path: /v1/disputes/{dispute}
          description: "Individual dispute"
          operations:
            - name: get-dispute
              method: GET
              description: "Retrieve a dispute by ID"
              inputParameters:
                - name: dispute
                  in: path
                  type: string
                  required: true
                  description: "Dispute ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-dispute
              method: POST
              description: "Update dispute evidence"
              inputParameters:
                - name: dispute
                  in: path
                  type: string
                  required: true
                  description: "Dispute ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dispute-close
          path: /v1/disputes/{dispute}/close
          description: "Close a dispute"
          operations:
            - name: close-dispute
              method: POST
              description: "Close a dispute by accepting the chargeback"
              inputParameters:
                - name: dispute
                  in: path
                  type: string
                  required: true
                  description: "Dispute ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8106
      namespace: stripe-disputes-rest
      resources:
        - path: /v1/disputes
          name: disputes
          operations:
            - method: GET
              name: list-disputes
              description: "List disputes"
              call: "stripe-disputes.list-disputes"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/disputes/{dispute}
          name: dispute
          operations:
            - method: GET
              name: get-dispute
              description: "Get a dispute"
              call: "stripe-disputes.get-dispute"
              with:
                dispute: "rest.dispute"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9106
      namespace: stripe-disputes-mcp
      transport: http
      tools:
        - name: list-disputes
          description: "List Stripe disputes (chargebacks)"
          hints:
            readOnly: true
          call: "stripe-disputes.list-disputes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dispute
          description: "Retrieve a Stripe dispute by ID"
          hints:
            readOnly: true
          call: "stripe-disputes.get-dispute"
          with:
            dispute: "tools.dispute"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-dispute
          description: "Update evidence for a Stripe dispute"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-disputes.update-dispute"
          with:
            dispute: "tools.dispute"
          outputParameters:
            - type: object
              mapping: "$."
        - name: close-dispute
          description: "Close a Stripe dispute (accept the chargeback)"
          hints:
            readOnly: false
            destructive: true
          call: "stripe-disputes.close-dispute"
          with:
            dispute: "tools.dispute"
          outputParameters:
            - type: object
              mapping: "$."
