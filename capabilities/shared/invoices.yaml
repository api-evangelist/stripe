naftiko: "1.0.0-alpha1"

info:
  label: "Stripe Invoice API"
  description: >-
    Manage Stripe invoices including creating, finalizing, paying, voiding, and sending invoices.
    Also manage invoice items and preview upcoming invoices.
  tags:
    - Stripe
    - Invoices
    - Billing
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STRIPE_API_KEY: STRIPE_API_KEY

capability:
  consumes:
    - type: http
      namespace: stripe-invoices
      baseUri: https://api.stripe.com
      description: "Stripe Invoice API for billing document management."
      authentication:
        type: bearer
        token: "{{STRIPE_API_KEY}}"
      resources:
        - name: invoices
          path: /v1/invoices
          description: "Invoice collection"
          operations:
            - name: list-invoices
              method: GET
              description: "List all invoices"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
                - name: customer
                  in: query
                  type: string
                  required: false
                  description: "Filter by customer"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status (draft, open, paid, uncollectible, void)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-invoice
              method: POST
              description: "Create a new invoice"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: invoice
          path: /v1/invoices/{invoice}
          description: "Individual invoice"
          operations:
            - name: get-invoice
              method: GET
              description: "Retrieve an invoice"
              inputParameters:
                - name: invoice
                  in: path
                  type: string
                  required: true
                  description: "Invoice ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: invoice-finalize
          path: /v1/invoices/{invoice}/finalize
          description: "Finalize an invoice"
          operations:
            - name: finalize-invoice
              method: POST
              description: "Finalize a draft invoice"
              inputParameters:
                - name: invoice
                  in: path
                  type: string
                  required: true
                  description: "Invoice ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: invoice-pay
          path: /v1/invoices/{invoice}/pay
          description: "Pay an invoice"
          operations:
            - name: pay-invoice
              method: POST
              description: "Attempt to pay an invoice"
              inputParameters:
                - name: invoice
                  in: path
                  type: string
                  required: true
                  description: "Invoice ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: invoice-send
          path: /v1/invoices/{invoice}/send
          description: "Send an invoice"
          operations:
            - name: send-invoice
              method: POST
              description: "Email an invoice to the customer"
              inputParameters:
                - name: invoice
                  in: path
                  type: string
                  required: true
                  description: "Invoice ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: invoice-void
          path: /v1/invoices/{invoice}/void
          description: "Void an invoice"
          operations:
            - name: void-invoice
              method: POST
              description: "Void an open invoice"
              inputParameters:
                - name: invoice
                  in: path
                  type: string
                  required: true
                  description: "Invoice ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: stripe-invoices-rest
      resources:
        - path: /v1/invoices
          name: invoices
          operations:
            - method: GET
              name: list-invoices
              description: "List invoices"
              call: "stripe-invoices.list-invoices"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-invoice
              description: "Create an invoice"
              call: "stripe-invoices.create-invoice"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/invoices/{invoice}
          name: invoice
          operations:
            - method: GET
              name: get-invoice
              description: "Get an invoice"
              call: "stripe-invoices.get-invoice"
              with:
                invoice: "rest.invoice"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: stripe-invoices-mcp
      transport: http
      tools:
        - name: list-invoices
          description: "List Stripe invoices"
          hints:
            readOnly: true
          call: "stripe-invoices.list-invoices"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-invoice
          description: "Create a Stripe invoice"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-invoices.create-invoice"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-invoice
          description: "Get a Stripe invoice"
          hints:
            readOnly: true
          call: "stripe-invoices.get-invoice"
          with:
            invoice: "tools.invoice"
          outputParameters:
            - type: object
              mapping: "$."
        - name: finalize-invoice
          description: "Finalize a Stripe draft invoice"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-invoices.finalize-invoice"
          with:
            invoice: "tools.invoice"
          outputParameters:
            - type: object
              mapping: "$."
        - name: pay-invoice
          description: "Pay a Stripe invoice"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-invoices.pay-invoice"
          with:
            invoice: "tools.invoice"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-invoice
          description: "Email a Stripe invoice to the customer"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-invoices.send-invoice"
          with:
            invoice: "tools.invoice"
          outputParameters:
            - type: object
              mapping: "$."
        - name: void-invoice
          description: "Void an open Stripe invoice"
          hints:
            readOnly: false
            destructive: true
          call: "stripe-invoices.void-invoice"
          with:
            invoice: "tools.invoice"
          outputParameters:
            - type: object
              mapping: "$."
