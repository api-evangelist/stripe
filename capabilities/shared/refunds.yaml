naftiko: "1.0.0-alpha1"

info:
  label: "Stripe Refunds API"
  description: >-
    Manage refunds on Stripe charges and payment intents. Create, retrieve, update, and cancel refunds.
  tags:
    - Stripe
    - Refunds
    - Payments
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STRIPE_API_KEY: STRIPE_API_KEY

capability:
  consumes:
    - type: http
      namespace: stripe-refunds
      baseUri: https://api.stripe.com
      description: "Stripe Refunds API for managing charge reversals."
      authentication:
        type: bearer
        token: "{{STRIPE_API_KEY}}"
      resources:
        - name: refunds
          path: /v1/refunds
          description: "Refund collection"
          operations:
            - name: list-refunds
              method: GET
              description: "List all refunds"
              inputParameters:
                - name: charge
                  in: query
                  type: string
                  required: false
                  description: "Filter by charge ID"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-refund
              method: POST
              description: "Create a refund"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  charge: "{{tools.charge}}"
                  amount: "{{tools.amount}}"

        - name: refund
          path: /v1/refunds/{refund}
          description: "Individual refund"
          operations:
            - name: get-refund
              method: GET
              description: "Retrieve a refund by ID"
              inputParameters:
                - name: refund
                  in: path
                  type: string
                  required: true
                  description: "Refund ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: refund-cancel
          path: /v1/refunds/{refund}/cancel
          description: "Cancel a refund"
          operations:
            - name: cancel-refund
              method: POST
              description: "Cancel a pending refund"
              inputParameters:
                - name: refund
                  in: path
                  type: string
                  required: true
                  description: "Refund ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8105
      namespace: stripe-refunds-rest
      resources:
        - path: /v1/refunds
          name: refunds
          operations:
            - method: GET
              name: list-refunds
              description: "List refunds"
              call: "stripe-refunds.list-refunds"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-refund
              description: "Create a refund"
              call: "stripe-refunds.create-refund"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: stripe-refunds-mcp
      transport: http
      tools:
        - name: list-refunds
          description: "List Stripe refunds"
          hints:
            readOnly: true
          call: "stripe-refunds.list-refunds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-refund
          description: "Create a Stripe refund on a charge"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-refunds.create-refund"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-refund
          description: "Retrieve a Stripe refund by ID"
          hints:
            readOnly: true
          call: "stripe-refunds.get-refund"
          with:
            refund: "tools.refund"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-refund
          description: "Cancel a pending Stripe refund"
          hints:
            readOnly: false
            destructive: true
          call: "stripe-refunds.cancel-refund"
          with:
            refund: "tools.refund"
          outputParameters:
            - type: object
              mapping: "$."
