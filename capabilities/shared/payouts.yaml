naftiko: "1.0.0-alpha1"

info:
  label: "Stripe Payouts API"
  description: >-
    Manage Stripe payouts to bank accounts. Create, retrieve, update, cancel, and reverse payouts.
  tags:
    - Stripe
    - Payouts
    - Financial Operations
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STRIPE_API_KEY: STRIPE_API_KEY

capability:
  consumes:
    - type: http
      namespace: stripe-payouts
      baseUri: https://api.stripe.com
      description: "Stripe Payouts API for managing bank transfers."
      authentication:
        type: bearer
        token: "{{STRIPE_API_KEY}}"
      resources:
        - name: payouts
          path: /v1/payouts
          description: "Payout collection"
          operations:
            - name: list-payouts
              method: GET
              description: "List all payouts"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items to return"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status (pending, paid, failed, canceled)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-payout
              method: POST
              description: "Create a payout to bank account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  amount: "{{tools.amount}}"
                  currency: "{{tools.currency}}"

        - name: payout
          path: /v1/payouts/{payout}
          description: "Individual payout"
          operations:
            - name: get-payout
              method: GET
              description: "Retrieve a payout by ID"
              inputParameters:
                - name: payout
                  in: path
                  type: string
                  required: true
                  description: "Payout ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payout-cancel
          path: /v1/payouts/{payout}/cancel
          description: "Cancel a payout"
          operations:
            - name: cancel-payout
              method: POST
              description: "Cancel a pending payout"
              inputParameters:
                - name: payout
                  in: path
                  type: string
                  required: true
                  description: "Payout ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: payout-reverse
          path: /v1/payouts/{payout}/reverse
          description: "Reverse a payout"
          operations:
            - name: reverse-payout
              method: POST
              description: "Reverse a payout that has already been sent"
              inputParameters:
                - name: payout
                  in: path
                  type: string
                  required: true
                  description: "Payout ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8107
      namespace: stripe-payouts-rest
      resources:
        - path: /v1/payouts
          name: payouts
          operations:
            - method: GET
              name: list-payouts
              description: "List payouts"
              call: "stripe-payouts.list-payouts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-payout
              description: "Create a payout"
              call: "stripe-payouts.create-payout"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9107
      namespace: stripe-payouts-mcp
      transport: http
      tools:
        - name: list-payouts
          description: "List Stripe payouts"
          hints:
            readOnly: true
          call: "stripe-payouts.list-payouts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-payout
          description: "Create a Stripe payout to bank account"
          hints:
            readOnly: false
            destructive: false
          call: "stripe-payouts.create-payout"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-payout
          description: "Retrieve a Stripe payout by ID"
          hints:
            readOnly: true
          call: "stripe-payouts.get-payout"
          with:
            payout: "tools.payout"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-payout
          description: "Cancel a pending Stripe payout"
          hints:
            readOnly: false
            destructive: true
          call: "stripe-payouts.cancel-payout"
          with:
            payout: "tools.payout"
          outputParameters:
            - type: object
              mapping: "$."
