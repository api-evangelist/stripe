naftiko: 1.0.0-alpha2
info:
  label: Stripe Ephemeral Keys API — Post
  description: 'Stripe Ephemeral Keys API — Post. 1 operations. Lead operation: Stripe Post   Ephemeral Keys. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Post
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ephemeral-keys-post
    baseUri: https://api.stripe.com
    description: Stripe Ephemeral Keys API — Post business capability. Self-contained, no shared references.
    resources:
    - name: v1-ephemeral_keys
      path: /v1/ephemeral_keys
      operations:
      - name: postephemeralkeys
        method: POST
        description: Stripe Post   Ephemeral Keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ephemeral-keys-post-rest
    port: 8080
    description: REST adapter for Stripe Ephemeral Keys API — Post. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/ephemeral-keys
      name: v1-ephemeral-keys
      description: REST surface for v1-ephemeral_keys.
      operations:
      - method: POST
        name: postephemeralkeys
        description: Stripe Post   Ephemeral Keys
        call: ephemeral-keys-post.postephemeralkeys
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ephemeral-keys-post-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Ephemeral Keys API — Post. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-post-ephemeral-keys
      description: Stripe Post   Ephemeral Keys
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ephemeral-keys-post.postephemeralkeys
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
