naftiko: 1.0.0-alpha2
info:
  label: Stripe Application Fees API — Update
  description: 'Stripe Application Fees API — Update. 1 operations. Lead operation: Stripe Update Application Fee Refund.
    Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Update
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: application-fees-update
    baseUri: https://api.stripe.com
    description: Stripe Application Fees API — Update business capability. Self-contained, no shared references.
    resources:
    - name: v1-application_fees-fee-refunds-id
      path: /v1/application_fees/{fee}/refunds/{id}
      operations:
      - name: postapplicationfeesfeerefundsid
        method: POST
        description: Stripe Update Application Fee Refund
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fee
          in: path
          type: string
          required: true
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: application-fees-update-rest
    port: 8080
    description: REST adapter for Stripe Application Fees API — Update. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/application-fees/{fee}/refunds/{id}
      name: v1-application-fees-fee-refunds-id
      description: REST surface for v1-application_fees-fee-refunds-id.
      operations:
      - method: POST
        name: postapplicationfeesfeerefundsid
        description: Stripe Update Application Fee Refund
        call: application-fees-update.postapplicationfeesfeerefundsid
        with:
          fee: rest.fee
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: application-fees-update-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Application Fees API — Update. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-update-application-fee-refund
      description: Stripe Update Application Fee Refund
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: application-fees-update.postapplicationfeesfeerefundsid
      with:
        fee: tools.fee
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
