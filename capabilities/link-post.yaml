    description: Stripe Link API — Post business capability. Self-contained, no shared references.
    resources:
    - name: v1-link_account_sessions
      path: /v1/link_account_sessions
      operations:
      - name: postlinkaccountsessions
        method: POST
        description: Stripe Post   Link Account Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-linked_accounts-account-disconnect
      path: /v1/linked_accounts/{account}/disconnect
      operations:
      - name: postlinkedaccountsaccountdisconnect
        method: POST
        description: Stripe Post   Linked Accounts Disconnect
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
