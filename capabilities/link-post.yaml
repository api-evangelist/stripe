        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: link-post-rest
    port: 8080
    description: REST adapter for Stripe Link API — Post. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/link-account-sessions
      name: v1-link-account-sessions
      description: REST surface for v1-link_account_sessions.
      operations:
      - method: POST
        name: postlinkaccountsessions
        description: Stripe Post   Link Account Sessions
        call: link-post.postlinkaccountsessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/linked-accounts/{account}/disconnect
