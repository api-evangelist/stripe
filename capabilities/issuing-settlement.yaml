naftiko: 1.0.0-alpha2
info:
  label: Stripe Issuing API — Settlement
  description: 'Stripe Issuing API — Settlement. 2 operations. Lead operation: Stripe Get   Issuing Settlements Settlement.
    Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Settlement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuing-settlement
    baseUri: https://api.stripe.com
    description: Stripe Issuing API — Settlement business capability. Self-contained, no shared references.
    resources:
    - name: v1-issuing-settlements-settlement
      path: /v1/issuing/settlements/{settlement}
      operations:
      - name: getissuingsettlementssettlement
        method: GET
        description: Stripe Get   Issuing Settlements Settlement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: settlement
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingsettlementssettlement
        method: POST
        description: Stripe Post   Issuing Settlements Settlement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: settlement
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuing-settlement-rest
    port: 8080
    description: REST adapter for Stripe Issuing API — Settlement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/issuing/settlements/{settlement}
      name: v1-issuing-settlements-settlement
      description: REST surface for v1-issuing-settlements-settlement.
      operations:
      - method: GET
        name: getissuingsettlementssettlement
        description: Stripe Get   Issuing Settlements Settlement
        call: issuing-settlement.getissuingsettlementssettlement
        with:
          expand: rest.expand
          settlement: rest.settlement
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postissuingsettlementssettlement
        description: Stripe Post   Issuing Settlements Settlement
        call: issuing-settlement.postissuingsettlementssettlement
        with:
          settlement: rest.settlement
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuing-settlement-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Issuing API — Settlement. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-get-issuing-settlements-settlement
      description: Stripe Get   Issuing Settlements Settlement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-settlement.getissuingsettlementssettlement
      with:
        expand: tools.expand
        settlement: tools.settlement
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-issuing-settlements-settlement
      description: Stripe Post   Issuing Settlements Settlement
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-settlement.postissuingsettlementssettlement
      with:
        settlement: tools.settlement
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
