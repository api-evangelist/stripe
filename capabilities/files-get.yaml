naftiko: 1.0.0-alpha2
info:
  label: Stripe Files API — Get
  description: 'Stripe Files API — Get. 2 operations. Lead operation: Stripe Get   Files. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: files-get
    baseUri: https://api.stripe.com
    description: Stripe Files API — Get business capability. Self-contained, no shared references.
    resources:
    - name: v1-files
      path: /v1/files
      operations:
      - name: getfiles
        method: GET
        description: Stripe Get   Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: created
          in: query
          type: string
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: purpose
          in: query
          type: string
          description: Filter queries by the file purpose. If you don't provide a purpose, the queries return unfiltered files.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-files-file
      path: /v1/files/{file}
      operations:
      - name: getfilesfile
        method: GET
        description: Stripe Get   Files File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: file
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: files-get-rest
    port: 8080
    description: REST adapter for Stripe Files API — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/files
      name: v1-files
      description: REST surface for v1-files.
      operations:
      - method: GET
        name: getfiles
        description: Stripe Get   Files
        call: files-get.getfiles
        with:
          created: rest.created
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          purpose: rest.purpose
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/files/{file}
      name: v1-files-file
      description: REST surface for v1-files-file.
      operations:
      - method: GET
        name: getfilesfile
        description: Stripe Get   Files File
        call: files-get.getfilesfile
        with:
          expand: rest.expand
          file: rest.file
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: files-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Files API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-get-files
      description: Stripe Get   Files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: files-get.getfiles
      with:
        created: tools.created
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        purpose: tools.purpose
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-files-file
      description: Stripe Get   Files File
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: files-get.getfilesfile
      with:
        expand: tools.expand
        file: tools.file
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
