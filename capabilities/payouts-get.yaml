naftiko: 1.0.0-alpha2
info:
  label: Stripe Payouts API — Get
  description: 'Stripe Payouts API — Get. 2 operations. Lead operation: Stripe Get   Payouts. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: payouts-get
    baseUri: https://api.stripe.com
    description: Stripe Payouts API — Get business capability. Self-contained, no shared references.
    resources:
    - name: v1-payouts
      path: /v1/payouts
      operations:
      - name: getpayouts
        method: GET
        description: Stripe Get   Payouts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: arrival_date
          in: query
          type: string
        - name: created
          in: query
          type: string
        - name: destination
          in: query
          type: string
          description: The ID of an external account - only return payouts sent to this external account.
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: status
          in: query
          type: string
          description: 'Only return payouts that have the given status: `pending`, `paid`, `failed`, or `canceled`.'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-payouts-payout
      path: /v1/payouts/{payout}
      operations:
      - name: getpayoutspayout
        method: GET
        description: Stripe Get   Payouts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: payout
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: payouts-get-rest
    port: 8080
    description: REST adapter for Stripe Payouts API — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/payouts
      name: v1-payouts
      description: REST surface for v1-payouts.
      operations:
      - method: GET
        name: getpayouts
        description: Stripe Get   Payouts
        call: payouts-get.getpayouts
        with:
          arrival_date: rest.arrival_date
          created: rest.created
          destination: rest.destination
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          status: rest.status
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/payouts/{payout}
      name: v1-payouts-payout
      description: REST surface for v1-payouts-payout.
      operations:
      - method: GET
        name: getpayoutspayout
        description: Stripe Get   Payouts
        call: payouts-get.getpayoutspayout
        with:
          expand: rest.expand
          payout: rest.payout
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payouts-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Payouts API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-get-payouts
      description: Stripe Get   Payouts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payouts-get.getpayouts
      with:
        arrival_date: tools.arrival_date
        created: tools.created
        destination: tools.destination
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        status: tools.status
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-payouts-2
      description: Stripe Get   Payouts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: payouts-get.getpayoutspayout
      with:
        expand: tools.expand
        payout: tools.payout
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
