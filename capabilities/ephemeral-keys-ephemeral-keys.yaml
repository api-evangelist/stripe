naftiko: 1.0.0-alpha2
info:
  label: Stripe Ephemeral Keys API — Ephemeral Keys
  description: 'Stripe Ephemeral Keys API — Ephemeral Keys. 2 operations. Lead operation: Ephemeral Keys. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Ephemeral Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: ephemeral-keys-ephemeral-keys
    baseUri: https://api.stripe.com
    description: Stripe Ephemeral Keys API — Ephemeral Keys business capability. Self-contained, no shared references.
    resources:
    - name: v1-ephemeral_keys
      path: /v1/ephemeral_keys
      operations:
      - name: postephemeralkeys
        method: POST
        description: <p>Creates a short-lived API key for a given resource.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-ephemeral_keys-key
      path: /v1/ephemeral_keys/{key}
      operations:
      - name: deleteephemeralkeyskey
        method: DELETE
        description: <p>Invalidates a short-lived API key for a given resource.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: key
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: ephemeral-keys-ephemeral-keys-rest
    port: 8080
    description: REST adapter for Stripe Ephemeral Keys API — Ephemeral Keys. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/ephemeral-keys
      name: v1-ephemeral-keys
      description: REST surface for v1-ephemeral_keys.
      operations:
      - method: POST
        name: postephemeralkeys
        description: <p>Creates a short-lived API key for a given resource.</p>
        call: ephemeral-keys-ephemeral-keys.postephemeralkeys
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/ephemeral-keys/{key}
      name: v1-ephemeral-keys-key
      description: REST surface for v1-ephemeral_keys-key.
      operations:
      - method: DELETE
        name: deleteephemeralkeyskey
        description: <p>Invalidates a short-lived API key for a given resource.</p>
        call: ephemeral-keys-ephemeral-keys.deleteephemeralkeyskey
        with:
          key: rest.key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ephemeral-keys-ephemeral-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Ephemeral Keys API — Ephemeral Keys. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: p-creates-short-lived-api-key
      description: <p>Creates a short-lived API key for a given resource.</p>
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ephemeral-keys-ephemeral-keys.postephemeralkeys
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: p-invalidates-short-lived-api-key
      description: <p>Invalidates a short-lived API key for a given resource.</p>
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: ephemeral-keys-ephemeral-keys.deleteephemeralkeyskey
      with:
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
