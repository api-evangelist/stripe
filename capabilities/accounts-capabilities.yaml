naftiko: 1.0.0-alpha2
info:
  label: Stripe Accounts API — Capabilities
  description: 'Stripe Accounts API — Capabilities. 1 operations. Lead operation: Stripe List Capabilities. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Capabilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-capabilities
    baseUri: https://api.stripe.com
    description: Stripe Accounts API — Capabilities business capability. Self-contained, no shared references.
    resources:
    - name: v1-accounts-account-capabilities
      path: /v1/accounts/{account}/capabilities
      operations:
      - name: getaccountsaccountcapabilities
        method: GET
        description: Stripe List Capabilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: account
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: accounts-capabilities-rest
    port: 8080
    description: REST adapter for Stripe Accounts API — Capabilities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/accounts/{account}/capabilities
      name: v1-accounts-account-capabilities
      description: REST surface for v1-accounts-account-capabilities.
      operations:
      - method: GET
        name: getaccountsaccountcapabilities
        description: Stripe List Capabilities
        call: accounts-capabilities.getaccountsaccountcapabilities
        with:
          account: rest.account
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-capabilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Accounts API — Capabilities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-list-capabilities
      description: Stripe List Capabilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: accounts-capabilities.getaccountsaccountcapabilities
      with:
        account: tools.account
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
