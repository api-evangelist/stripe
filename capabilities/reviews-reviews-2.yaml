naftiko: 1.0.0-alpha2
info:
  label: Stripe Reviews API — Reviews
  description: 'Stripe Reviews API — Reviews. 3 operations. Lead operation: Stripe List Reviews. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Reviews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: reviews-reviews-2
    baseUri: https://api.stripe.com
    description: Stripe Reviews API — Reviews business capability. Self-contained, no shared references.
    resources:
    - name: v1-reviews
      path: /v1/reviews
      operations:
      - name: getreviews
        method: GET
        description: Stripe List Reviews
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ending_before
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: starting_after
          in: query
          type: string
        - name: expand
          in: query
          type: array
    - name: v1-reviews-review
      path: /v1/reviews/{review}
      operations:
      - name: getreviewsreview
        method: GET
        description: Stripe Retrieve Review
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: review
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
    - name: v1-reviews-review-approve
      path: /v1/reviews/{review}/approve
      operations:
      - name: postreviewsreviewapprove
        method: POST
        description: Stripe Approve Review
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: review
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: reviews-reviews-2-rest
    port: 8080
    description: REST adapter for Stripe Reviews API — Reviews. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/reviews
      name: v1-reviews
      description: REST surface for v1-reviews.
      operations:
      - method: GET
        name: getreviews
        description: Stripe List Reviews
        call: reviews-reviews-2.getreviews
        with:
          ending_before: rest.ending_before
          limit: rest.limit
          starting_after: rest.starting_after
          expand: rest.expand
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/reviews/{review}
      name: v1-reviews-review
      description: REST surface for v1-reviews-review.
      operations:
      - method: GET
        name: getreviewsreview
        description: Stripe Retrieve Review
        call: reviews-reviews-2.getreviewsreview
        with:
          review: rest.review
          expand: rest.expand
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/reviews/{review}/approve
      name: v1-reviews-review-approve
      description: REST surface for v1-reviews-review-approve.
      operations:
      - method: POST
        name: postreviewsreviewapprove
        description: Stripe Approve Review
        call: reviews-reviews-2.postreviewsreviewapprove
        with:
          review: rest.review
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reviews-reviews-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Reviews API — Reviews. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-list-reviews
      description: Stripe List Reviews
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reviews-reviews-2.getreviews
      with:
        ending_before: tools.ending_before
        limit: tools.limit
        starting_after: tools.starting_after
        expand: tools.expand
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-retrieve-review
      description: Stripe Retrieve Review
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reviews-reviews-2.getreviewsreview
      with:
        review: tools.review
        expand: tools.expand
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-approve-review
      description: Stripe Approve Review
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reviews-reviews-2.postreviewsreviewapprove
      with:
        review: tools.review
      outputParameters:
      - type: object
        mapping: $.
