naftiko: 1.0.0-alpha2
info:
  label: Stripe Invoice API — Delete
  description: 'Stripe Invoice API — Delete. 2 operations. Lead operation: Stripe Delete   Invoice Items. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: invoice-delete
    baseUri: https://api.stripe.com
    description: Stripe Invoice API — Delete business capability. Self-contained, no shared references.
    resources:
    - name: v1-Invoice Items-invoiceitem
      path: /v1/Invoice Items/{invoiceitem}
      operations:
      - name: deleteinvoiceitemsinvoiceitem
        method: DELETE
        description: Stripe Delete   Invoice Items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: invoiceitem
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-invoices-invoice
      path: /v1/invoices/{invoice}
      operations:
      - name: deleteinvoicesinvoice
        method: DELETE
        description: Stripe Delete   Invoices Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: invoice
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: invoice-delete-rest
    port: 8080
    description: REST adapter for Stripe Invoice API — Delete. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/invoice-items/{invoiceitem}
      name: v1-invoice-items-invoiceitem
      description: REST surface for v1-Invoice Items-invoiceitem.
      operations:
      - method: DELETE
        name: deleteinvoiceitemsinvoiceitem
        description: Stripe Delete   Invoice Items
        call: invoice-delete.deleteinvoiceitemsinvoiceitem
        with:
          invoiceitem: rest.invoiceitem
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/invoices/{invoice}
      name: v1-invoices-invoice
      description: REST surface for v1-invoices-invoice.
      operations:
      - method: DELETE
        name: deleteinvoicesinvoice
        description: Stripe Delete   Invoices Invoice
        call: invoice-delete.deleteinvoicesinvoice
        with:
          invoice: rest.invoice
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: invoice-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Invoice API — Delete. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-delete-invoice-items
      description: Stripe Delete   Invoice Items
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: invoice-delete.deleteinvoiceitemsinvoiceitem
      with:
        invoiceitem: tools.invoiceitem
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-delete-invoices-invoice
      description: Stripe Delete   Invoices Invoice
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: invoice-delete.deleteinvoicesinvoice
      with:
        invoice: tools.invoice
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
