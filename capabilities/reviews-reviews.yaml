naftiko: 1.0.0-alpha2
info:
  label: Stripe Reviews API — Reviews
  description: 'Stripe Reviews API — Reviews. 3 operations. Lead operation: Reviews. Self-contained Naftiko capability covering
    one Stripe business surface.'
  tags:
  - Stripe
  - Reviews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: reviews-reviews
    baseUri: https://api.stripe.com
    description: Stripe Reviews API — Reviews business capability. Self-contained, no shared references.
    resources:
    - name: v1-reviews
      path: /v1/reviews
      operations:
      - name: getreviews
        method: GET
        description: <p>Returns a list of <code>Review</code> objects that have <code>open</code> set to <code>true</code>.
          The objects are sorted in descending order by creation date, with the most recently created object appearing first.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: created
          in: query
          type: string
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-reviews-review
      path: /v1/reviews/{review}
      operations:
      - name: getreviewsreview
        method: GET
        description: <p>Retrieves a <code>Review</code> object.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: review
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-reviews-review-approve
      path: /v1/reviews/{review}/approve
      operations:
      - name: postreviewsreviewapprove
        method: POST
        description: <p>Approves a <code>Review</code> object, closing it and removing it from the list of reviews.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: review
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: reviews-reviews-rest
    port: 8080
    description: REST adapter for Stripe Reviews API — Reviews. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/reviews
      name: v1-reviews
      description: REST surface for v1-reviews.
      operations:
      - method: GET
        name: getreviews
        description: <p>Returns a list of <code>Review</code> objects that have <code>open</code> set to <code>true</code>.
          The objects are sorted in descending order by creation date, with the most recently created object appearing first.</p>
        call: reviews-reviews.getreviews
        with:
          created: rest.created
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/reviews/{review}
      name: v1-reviews-review
      description: REST surface for v1-reviews-review.
      operations:
      - method: GET
        name: getreviewsreview
        description: <p>Retrieves a <code>Review</code> object.</p>
        call: reviews-reviews.getreviewsreview
        with:
          expand: rest.expand
          review: rest.review
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/reviews/{review}/approve
      name: v1-reviews-review-approve
      description: REST surface for v1-reviews-review-approve.
      operations:
      - method: POST
        name: postreviewsreviewapprove
        description: <p>Approves a <code>Review</code> object, closing it and removing it from the list of reviews.</p>
        call: reviews-reviews.postreviewsreviewapprove
        with:
          review: rest.review
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reviews-reviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Reviews API — Reviews. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: p-returns-list-code-review-code-objects
      description: <p>Returns a list of <code>Review</code> objects that have <code>open</code> set to <code>true</code>.
        The objects are sorted in descending order by creation date, with the most recently created object appearing first.</p>
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reviews-reviews.getreviews
      with:
        created: tools.created
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: p-retrieves-code-review-code-object-p
      description: <p>Retrieves a <code>Review</code> object.</p>
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reviews-reviews.getreviewsreview
      with:
        expand: tools.expand
        review: tools.review
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: p-approves-code-review-code-object-closing
      description: <p>Approves a <code>Review</code> object, closing it and removing it from the list of reviews.</p>
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: reviews-reviews.postreviewsreviewapprove
      with:
        review: tools.review
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
