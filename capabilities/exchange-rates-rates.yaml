naftiko: 1.0.0-alpha2
info:
  label: Stripe Exchange Rates API — Rates
  description: 'Stripe Exchange Rates API — Rates. 2 operations. Lead operation: Stripe Get   Exchange Rates. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Rates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: exchange-rates-rates
    baseUri: https://api.stripe.com
    description: Stripe Exchange Rates API — Rates business capability. Self-contained, no shared references.
    resources:
    - name: v1-exchange_rates
      path: /v1/exchange_rates
      operations:
      - name: getexchangerates
        method: GET
        description: Stripe Get   Exchange Rates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is the currency that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and total number of supported
            payout currencies, and the default is the max.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is the currency that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-exchange_rates-rate_id
      path: /v1/exchange_rates/{rate_id}
      operations:
      - name: getexchangeratesrateid
        method: GET
        description: Stripe Get   Exchange Rates Rate Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: rate_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: exchange-rates-rates-rest
    port: 8080
    description: REST adapter for Stripe Exchange Rates API — Rates. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/exchange-rates
      name: v1-exchange-rates
      description: REST surface for v1-exchange_rates.
      operations:
      - method: GET
        name: getexchangerates
        description: Stripe Get   Exchange Rates
        call: exchange-rates-rates.getexchangerates
        with:
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/exchange-rates/{rate-id}
      name: v1-exchange-rates-rate-id
      description: REST surface for v1-exchange_rates-rate_id.
      operations:
      - method: GET
        name: getexchangeratesrateid
        description: Stripe Get   Exchange Rates Rate Id
        call: exchange-rates-rates.getexchangeratesrateid
        with:
          expand: rest.expand
          rate_id: rest.rate_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: exchange-rates-rates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Exchange Rates API — Rates. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-get-exchange-rates
      description: Stripe Get   Exchange Rates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exchange-rates-rates.getexchangerates
      with:
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-exchange-rates-rate
      description: Stripe Get   Exchange Rates Rate Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: exchange-rates-rates.getexchangeratesrateid
      with:
        expand: tools.expand
        rate_id: tools.rate_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
