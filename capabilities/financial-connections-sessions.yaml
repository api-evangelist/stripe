naftiko: 1.0.0-alpha2
info:
  label: Stripe Financial Connections API — Sessions
  description: 'Stripe Financial Connections API — Sessions. 2 operations. Lead operation: Stripe Post   Financial Connections
    Sessions. Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-connections-sessions
    baseUri: https://api.stripe.com
    description: Stripe Financial Connections API — Sessions business capability. Self-contained, no shared references.
    resources:
    - name: v1-financial_connections-sessions
      path: /v1/financial_connections/sessions
      operations:
      - name: postfinancialconnectionssessions
        method: POST
        description: Stripe Post   Financial Connections Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-financial_connections-sessions-session
      path: /v1/financial_connections/sessions/{session}
      operations:
      - name: getfinancialconnectionssessionssession
        method: GET
        description: Stripe Get   Financial Connections Sessions Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: session
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-connections-sessions-rest
    port: 8080
    description: REST adapter for Stripe Financial Connections API — Sessions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/financial-connections/sessions
      name: v1-financial-connections-sessions
      description: REST surface for v1-financial_connections-sessions.
      operations:
      - method: POST
        name: postfinancialconnectionssessions
        description: Stripe Post   Financial Connections Sessions
        call: financial-connections-sessions.postfinancialconnectionssessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/financial-connections/sessions/{session}
      name: v1-financial-connections-sessions-session
      description: REST surface for v1-financial_connections-sessions-session.
      operations:
      - method: GET
        name: getfinancialconnectionssessionssession
        description: Stripe Get   Financial Connections Sessions Session
        call: financial-connections-sessions.getfinancialconnectionssessionssession
        with:
          expand: rest.expand
          session: rest.session
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-connections-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Financial Connections API — Sessions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: stripe-post-financial-connections-sessions
      description: Stripe Post   Financial Connections Sessions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: financial-connections-sessions.postfinancialconnectionssessions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-financial-connections-sessions
      description: Stripe Get   Financial Connections Sessions Session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-connections-sessions.getfinancialconnectionssessionssession
      with:
        expand: tools.expand
        session: tools.session
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
