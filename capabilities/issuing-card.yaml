naftiko: 1.0.0-alpha2
info:
  label: Stripe Issuing API — Card
  description: 'Stripe Issuing API — Card. 2 operations. Lead operation: Stripe Get   Issuing Cards Card. Self-contained Naftiko
    capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Card
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuing-card
    baseUri: https://api.stripe.com
    description: Stripe Issuing API — Card business capability. Self-contained, no shared references.
    resources:
    - name: v1-issuing-cards-card
      path: /v1/issuing/cards/{card}
      operations:
      - name: getissuingcardscard
        method: GET
        description: Stripe Get   Issuing Cards Card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingcardscard
        method: POST
        description: Stripe Post   Issuing Cards Card
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: card
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuing-card-rest
    port: 8080
    description: REST adapter for Stripe Issuing API — Card. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/issuing/cards/{card}
      name: v1-issuing-cards-card
      description: REST surface for v1-issuing-cards-card.
      operations:
      - method: GET
        name: getissuingcardscard
        description: Stripe Get   Issuing Cards Card
        call: issuing-card.getissuingcardscard
        with:
          card: rest.card
          expand: rest.expand
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postissuingcardscard
        description: Stripe Post   Issuing Cards Card
        call: issuing-card.postissuingcardscard
        with:
          card: rest.card
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuing-card-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Issuing API — Card. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-get-issuing-cards-card
      description: Stripe Get   Issuing Cards Card
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-card.getissuingcardscard
      with:
        card: tools.card
        expand: tools.expand
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-issuing-cards-card
      description: Stripe Post   Issuing Cards Card
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-card.postissuingcardscard
      with:
        card: tools.card
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
