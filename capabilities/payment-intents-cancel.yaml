naftiko: 1.0.0-alpha2
info:
  label: Stripe Payment Intents API — Cancel
  description: 'Stripe Payment Intents API — Cancel. 1 operations. Lead operation: Stripe Post   Payment Intents Cancel. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Cancel
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: payment-intents-cancel
    baseUri: https://api.stripe.com
    description: Stripe Payment Intents API — Cancel business capability. Self-contained, no shared references.
    resources:
    - name: v1-payment_intents-intent-cancel
      path: /v1/payment_intents/{intent}/cancel
      operations:
      - name: postpaymentintentsintentcancel
        method: POST
        description: Stripe Post   Payment Intents Cancel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: intent
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: payment-intents-cancel-rest
    port: 8080
    description: REST adapter for Stripe Payment Intents API — Cancel. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/payment-intents/{intent}/cancel
      name: v1-payment-intents-intent-cancel
      description: REST surface for v1-payment_intents-intent-cancel.
      operations:
      - method: POST
        name: postpaymentintentsintentcancel
        description: Stripe Post   Payment Intents Cancel
        call: payment-intents-cancel.postpaymentintentsintentcancel
        with:
          intent: rest.intent
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payment-intents-cancel-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Payment Intents API — Cancel. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-post-payment-intents-cancel
      description: Stripe Post   Payment Intents Cancel
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payment-intents-cancel.postpaymentintentsintentcancel
      with:
        intent: tools.intent
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
