naftiko: 1.0.0-alpha2
info:
  label: Stripe Credit Notes API — Note
  description: 'Stripe Credit Notes API — Note. 1 operations. Lead operation: Stripe Get   Credit Notes Credit Note Lines.
    Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Note
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: credit-notes-note
    baseUri: https://api.stripe.com
    description: Stripe Credit Notes API — Note business capability. Self-contained, no shared references.
    resources:
    - name: v1-credit_notes-credit_note-lines
      path: /v1/credit_notes/{credit_note}/lines
      operations:
      - name: getcreditnotescreditnotelines
        method: GET
        description: Stripe Get   Credit Notes Credit Note Lines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: credit_note
          in: path
          type: string
          required: true
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: credit-notes-note-rest
    port: 8080
    description: REST adapter for Stripe Credit Notes API — Note. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/credit-notes/{credit-note}/lines
      name: v1-credit-notes-credit-note-lines
      description: REST surface for v1-credit_notes-credit_note-lines.
      operations:
      - method: GET
        name: getcreditnotescreditnotelines
        description: Stripe Get   Credit Notes Credit Note Lines
        call: credit-notes-note.getcreditnotescreditnotelines
        with:
          credit_note: rest.credit_note
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: credit-notes-note-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Credit Notes API — Note. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-get-credit-notes-credit
      description: Stripe Get   Credit Notes Credit Note Lines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: credit-notes-note.getcreditnotescreditnotelines
      with:
        credit_note: tools.credit_note
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
