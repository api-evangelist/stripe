      operations:
      - name: getshippingratesshippingratetoken
        method: GET
        description: <p>Returns the shipping rate object with the given ID.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
