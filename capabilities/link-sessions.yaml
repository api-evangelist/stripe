naftiko: 1.0.0-alpha2
info:
  label: Stripe Link API — Sessions
  description: 'Stripe Link API — Sessions. 2 operations. Lead operation: Stripe Post   Link Account Sessions. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: link-sessions
    baseUri: https://api.stripe.com
    description: Stripe Link API — Sessions business capability. Self-contained, no shared references.
    resources:
    - name: v1-link_account_sessions
      path: /v1/link_account_sessions
      operations:
      - name: postlinkaccountsessions
        method: POST
        description: Stripe Post   Link Account Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-link_account_sessions-session
      path: /v1/link_account_sessions/{session}
      operations:
      - name: getlinkaccountsessionssession
        method: GET
        description: Stripe Get   Link Account Sessions Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: session
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: link-sessions-rest
    port: 8080
    description: REST adapter for Stripe Link API — Sessions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/link-account-sessions
      name: v1-link-account-sessions
      description: REST surface for v1-link_account_sessions.
      operations:
      - method: POST
        name: postlinkaccountsessions
        description: Stripe Post   Link Account Sessions
        call: link-sessions.postlinkaccountsessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/link-account-sessions/{session}
      name: v1-link-account-sessions-session
      description: REST surface for v1-link_account_sessions-session.
      operations:
      - method: GET
        name: getlinkaccountsessionssession
        description: Stripe Get   Link Account Sessions Session
        call: link-sessions.getlinkaccountsessionssession
        with:
          expand: rest.expand
          session: rest.session
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: link-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Link API — Sessions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-post-link-account-sessions
      description: Stripe Post   Link Account Sessions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: link-sessions.postlinkaccountsessions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-link-account-sessions
      description: Stripe Get   Link Account Sessions Session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: link-sessions.getlinkaccountsessionssession
      with:
        expand: tools.expand
        session: tools.session
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
