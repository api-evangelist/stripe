naftiko: 1.0.0-alpha2
info:
  label: Stripe Plans API — Post
  description: 'Stripe Plans API — Post. 2 operations. Lead operation: Stripe Post   Plans. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Post
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: plans-post
    baseUri: https://api.stripe.com
    description: Stripe Plans API — Post business capability. Self-contained, no shared references.
    resources:
    - name: v1-plans
      path: /v1/plans
      operations:
      - name: postplans
        method: POST
        description: Stripe Post   Plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-plans-plan
      path: /v1/plans/{plan}
      operations:
      - name: postplansplan
        method: POST
        description: Stripe Post   Plans
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: plan
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: plans-post-rest
    port: 8080
    description: REST adapter for Stripe Plans API — Post. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/plans
      name: v1-plans
      description: REST surface for v1-plans.
      operations:
      - method: POST
        name: postplans
        description: Stripe Post   Plans
        call: plans-post.postplans
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/plans/{plan}
      name: v1-plans-plan
      description: REST surface for v1-plans-plan.
      operations:
      - method: POST
        name: postplansplan
        description: Stripe Post   Plans
        call: plans-post.postplansplan
        with:
          plan: rest.plan
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: plans-post-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Plans API — Post. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-post-plans
      description: Stripe Post   Plans
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: plans-post.postplans
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-plans-2
      description: Stripe Post   Plans
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: plans-post.postplansplan
      with:
        plan: tools.plan
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
