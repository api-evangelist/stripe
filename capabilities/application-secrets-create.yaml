naftiko: 1.0.0-alpha2
info:
  label: Stripe Apple Pay API — Create
  description: 'Stripe Apple Pay API — Create. 1 operations. Lead operation: Stripe Create Apple Pay Domain. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: application-secrets-create
    baseUri: https://api.stripe.com
    description: Stripe Apple Pay API — Create business capability. Self-contained, no shared references.
    resources:
    - name: v1-apple_pay-domains
      path: /v1/apple_pay/domains
      operations:
      - name: postapplepaydomains
        method: POST
        description: Stripe Create Apple Pay Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: application-secrets-create-rest
    port: 8080
    description: REST adapter for Stripe Apple Pay API — Create. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/apple-pay/domains
      name: v1-apple-pay-domains
      description: REST surface for v1-apple_pay-domains.
      operations:
      - method: POST
        name: postapplepaydomains
        description: Stripe Create Apple Pay Domain
        call: application-secrets-create.postapplepaydomains
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: application-secrets-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Apple Pay API — Create. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-create-apple-pay-domain
      description: Stripe Create Apple Pay Domain
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: application-secrets-create.postapplepaydomains
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
