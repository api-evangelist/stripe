      path: /v1/transfers
      operations:
      - name: gettransfers
        method: GET
        description: Stripe List Transfers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: destination
          in: query
          type: string
          description: Only return transfers for the destination specified by this account ID.
        - name: transfer_group
          in: query
          type: string
          description: Only return transfers with the specified transfer group.
        - name: ending_before
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: starting_after
          in: query
          type: string
        - name: expand
          in: query
          type: array
      - name: posttransfers
        method: POST
        description: Stripe Create Transfer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-transfers-id-reversals
      path: /v1/transfers/{id}/reversals
      operations:
      - name: gettransfersidreversals
        method: GET
        description: Stripe List Transfer Reversals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: ending_before
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: starting_after
          in: query
          type: string
      - name: posttransfersidreversals
        method: POST
        description: Stripe Create Transfer Reversal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-transfers-transfer
      path: /v1/transfers/{transfer}
      operations:
      - name: gettransferstransfer
        method: GET
        description: Stripe Retrieve Transfer
        outputRawFormat: json
