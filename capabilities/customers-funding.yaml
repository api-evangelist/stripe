naftiko: 1.0.0-alpha2
info:
  label: Stripe Customers API — Funding
  description: 'Stripe Customers API — Funding. 1 operations. Lead operation: Stripe Post   Customers Customer Funding Instructions.
    Self-contained Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Funding
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: customers-funding
    baseUri: https://api.stripe.com
    description: Stripe Customers API — Funding business capability. Self-contained, no shared references.
    resources:
    - name: v1-customers-customer-funding_instructions
      path: /v1/customers/{customer}/funding_instructions
      operations:
      - name: postcustomerscustomerfundinginstructions
        method: POST
        description: Stripe Post   Customers Customer Funding Instructions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customer
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: customers-funding-rest
    port: 8080
    description: REST adapter for Stripe Customers API — Funding. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/customers/{customer}/funding-instructions
      name: v1-customers-customer-funding-instructions
      description: REST surface for v1-customers-customer-funding_instructions.
      operations:
      - method: POST
        name: postcustomerscustomerfundinginstructions
        description: Stripe Post   Customers Customer Funding Instructions
        call: customers-funding.postcustomerscustomerfundinginstructions
        with:
          customer: rest.customer
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: customers-funding-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Customers API — Funding. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-post-customers-customer-funding
      description: Stripe Post   Customers Customer Funding Instructions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: customers-funding.postcustomerscustomerfundinginstructions
      with:
        customer: tools.customer
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
