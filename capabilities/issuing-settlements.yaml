naftiko: 1.0.0-alpha2
info:
  label: Stripe Issuing API — Settlements
  description: 'Stripe Issuing API — Settlements. 3 operations. Lead operation: Stripe Get   Issuing Settlements. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Settlements
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: issuing-settlements
    baseUri: https://api.stripe.com
    description: Stripe Issuing API — Settlements business capability. Self-contained, no shared references.
    resources:
    - name: v1-issuing-settlements
      path: /v1/issuing/settlements
      operations:
      - name: getissuingsettlements
        method: GET
        description: Stripe Get   Issuing Settlements
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: created
          in: query
          type: string
          description: Only return issuing settlements that were created during the given date interval.
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-issuing-settlements-settlement
      path: /v1/issuing/settlements/{settlement}
      operations:
      - name: getissuingsettlementssettlement
        method: GET
        description: Stripe Get   Issuing Settlements Settlement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: settlement
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postissuingsettlementssettlement
        method: POST
        description: Stripe Post   Issuing Settlements Settlement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: settlement
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: issuing-settlements-rest
    port: 8080
    description: REST adapter for Stripe Issuing API — Settlements. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/issuing/settlements
      name: v1-issuing-settlements
      description: REST surface for v1-issuing-settlements.
      operations:
      - method: GET
        name: getissuingsettlements
        description: Stripe Get   Issuing Settlements
        call: issuing-settlements.getissuingsettlements
        with:
          created: rest.created
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/issuing/settlements/{settlement}
      name: v1-issuing-settlements-settlement
      description: REST surface for v1-issuing-settlements-settlement.
      operations:
      - method: GET
        name: getissuingsettlementssettlement
        description: Stripe Get   Issuing Settlements Settlement
        call: issuing-settlements.getissuingsettlementssettlement
        with:
          expand: rest.expand
          settlement: rest.settlement
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postissuingsettlementssettlement
        description: Stripe Post   Issuing Settlements Settlement
        call: issuing-settlements.postissuingsettlementssettlement
        with:
          settlement: rest.settlement
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: issuing-settlements-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Issuing API — Settlements. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: stripe-get-issuing-settlements
      description: Stripe Get   Issuing Settlements
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-settlements.getissuingsettlements
      with:
        created: tools.created
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-get-issuing-settlements-settlement
      description: Stripe Get   Issuing Settlements Settlement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: issuing-settlements.getissuingsettlementssettlement
      with:
        expand: tools.expand
        settlement: tools.settlement
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-post-issuing-settlements-settlement
      description: Stripe Post   Issuing Settlements Settlement
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: issuing-settlements.postissuingsettlementssettlement
      with:
        settlement: tools.settlement
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
