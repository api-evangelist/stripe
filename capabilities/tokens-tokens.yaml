naftiko: 1.0.0-alpha2
info:
  label: Stripe Tokens API — Tokens
  description: 'Stripe Tokens API — Tokens. 2 operations. Lead operation: Stripe Create Token. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: tokens-tokens
    baseUri: https://api.stripe.com
    description: Stripe Tokens API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: v1-tokens
      path: /v1/tokens
      operations:
      - name: posttokens
        method: POST
        description: Stripe Create Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-tokens-token
      path: /v1/tokens/{token}
      operations:
      - name: gettokenstoken
        method: GET
        description: Stripe Retrieve Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: path
          type: string
          required: true
        - name: expand
          in: query
          type: array
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: tokens-tokens-rest
    port: 8080
    description: REST adapter for Stripe Tokens API — Tokens. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/tokens
      name: v1-tokens
      description: REST surface for v1-tokens.
      operations:
      - method: POST
        name: posttokens
        description: Stripe Create Token
        call: tokens-tokens.posttokens
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/tokens/{token}
      name: v1-tokens-token
      description: REST surface for v1-tokens-token.
      operations:
      - method: GET
        name: gettokenstoken
        description: Stripe Retrieve Token
        call: tokens-tokens.gettokenstoken
        with:
          token: rest.token
          expand: rest.expand
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tokens-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Tokens API — Tokens. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-create-token
      description: Stripe Create Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tokens-tokens.posttokens
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: stripe-retrieve-token
      description: Stripe Retrieve Token
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tokens-tokens.gettokenstoken
      with:
        token: tools.token
        expand: tools.expand
      outputParameters:
      - type: object
        mapping: $.
