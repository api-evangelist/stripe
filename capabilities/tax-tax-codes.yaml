naftiko: 1.0.0-alpha2
info:
  label: Stripe Tax API — Tax Codes
  description: 'Stripe Tax API — Tax Codes. 2 operations. Lead operation: Tax Codes. Self-contained Naftiko capability covering
    one Stripe business surface.'
  tags:
  - Stripe
  - Tax Codes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: tax-tax-codes
    baseUri: https://api.stripe.com
    description: Stripe Tax API — Tax Codes business capability. Self-contained, no shared references.
    resources:
    - name: v1-tax_codes
      path: /v1/tax_codes
      operations:
      - name: gettaxcodes
        method: GET
        description: <p>A list of <a href="https://stripe.com/docs/tax/tax-categories">all tax codes available</a> to add
          to Products in order to allow specific tax calculations.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-tax_codes-id
      path: /v1/tax_codes/{id}
      operations:
      - name: gettaxcodesid
        method: GET
        description: <p>Retrieves the details of an existing tax code. Supply the unique tax code ID and Stripe will return
          the corresponding tax code information.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: tax-tax-codes-rest
    port: 8080
    description: REST adapter for Stripe Tax API — Tax Codes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/tax-codes
      name: v1-tax-codes
      description: REST surface for v1-tax_codes.
      operations:
      - method: GET
        name: gettaxcodes
        description: <p>A list of <a href="https://stripe.com/docs/tax/tax-categories">all tax codes available</a> to add
          to Products in order to allow specific tax calculations.</p>
        call: tax-tax-codes.gettaxcodes
        with:
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/tax-codes/{id}
      name: v1-tax-codes-id
      description: REST surface for v1-tax_codes-id.
      operations:
      - method: GET
        name: gettaxcodesid
        description: <p>Retrieves the details of an existing tax code. Supply the unique tax code ID and Stripe will return
          the corresponding tax code information.</p>
        call: tax-tax-codes.gettaxcodesid
        with:
          expand: rest.expand
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tax-tax-codes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Tax API — Tax Codes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: p-a-list-href-https-stripe-com-docs
      description: <p>A list of <a href="https://stripe.com/docs/tax/tax-categories">all tax codes available</a> to add to
        Products in order to allow specific tax calculations.</p>
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tax-tax-codes.gettaxcodes
      with:
        ending_before: tools.ending_before
        expand: tools.expand
        limit: tools.limit
        starting_after: tools.starting_after
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: p-retrieves-details-existing-tax-code
      description: <p>Retrieves the details of an existing tax code. Supply the unique tax code ID and Stripe will return
        the corresponding tax code information.</p>
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tax-tax-codes.gettaxcodesid
      with:
        expand: tools.expand
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
