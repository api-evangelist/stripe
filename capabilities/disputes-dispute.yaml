          description: Specifies which fields in the response should be expanded.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postdisputesdispute
        method: POST
        description: Stripe Post   Disputes Dispute
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
