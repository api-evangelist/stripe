        - name: limit
          in: query
          type: integer
        - name: starting_after
          in: query
          type: string
      - name: posttaxregistrations
        method: POST
        description: Stripe Create Tax Registration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
