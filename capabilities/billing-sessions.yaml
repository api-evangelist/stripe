naftiko: 1.0.0-alpha2
info:
  label: Stripe Billing API — Sessions
  description: 'Stripe Billing API — Sessions. 1 operations. Lead operation: Stripe Post   Billing Portal Sessions. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: billing-sessions
    baseUri: https://api.stripe.com
    description: Stripe Billing API — Sessions business capability. Self-contained, no shared references.
    resources:
    - name: v1-billing_portal-sessions
      path: /v1/billing_portal/sessions
      operations:
      - name: postbillingportalsessions
        method: POST
        description: Stripe Post   Billing Portal Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: billing-sessions-rest
    port: 8080
    description: REST adapter for Stripe Billing API — Sessions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/billing-portal/sessions
      name: v1-billing-portal-sessions
      description: REST surface for v1-billing_portal-sessions.
      operations:
      - method: POST
        name: postbillingportalsessions
        description: Stripe Post   Billing Portal Sessions
        call: billing-sessions.postbillingportalsessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: billing-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Billing API — Sessions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-post-billing-portal-sessions
      description: Stripe Post   Billing Portal Sessions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: billing-sessions.postbillingportalsessions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
