      - method: GET
        name: getpaymentmethods
        description: <p>Returns a list of PaymentMethods for Treasury flows. If you want to list the PaymentMethods attached
          to a Customer for payments, you should use the <a href="/docs/api/payment_methods/customer_list">List a Customer’s
          PaymentMethods</a> AP
        call: payment-method-payment-methods.getpaymentmethods
        with:
          customer: rest.customer
          ending_before: rest.ending_before
          expand: rest.expand
          limit: rest.limit
          starting_after: rest.starting_after
          type: rest.type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postpaymentmethods
        description: <p>Creates a PaymentMethod object. Read the <a href="/docs/stripe-js/reference#stripe-create-payment-method">Stripe.js
          reference</a> to learn how to create PaymentMethods via Stripe.js.</p>
        call: payment-method-payment-methods.postpaymentmethods
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/payment-methods/{payment-method}
      name: v1-payment-methods-payment-method
      description: REST surface for v1-payment_methods-payment_method.
      operations:
      - method: GET
        name: getpaymentmethodspaymentmethod
        description: <p>Retrieves a PaymentMethod object attached to the StripeAccount. To retrieve a payment method attached
          to a Customer, you should use <a href="/docs/api/payment_methods/customer">Retrieve a Customer’s PaymentMethods</a></p>
        call: payment-method-payment-methods.getpaymentmethodspaymentmethod
        with:
          expand: rest.expand
          payment_method: rest.payment_method
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postpaymentmethodspaymentmethod
        description: <p>Updates a PaymentMethod object. A PaymentMethod must be attached a customer to be updated.</p>
        call: payment-method-payment-methods.postpaymentmethodspaymentmethod
        with:
          payment_method: rest.payment_method
