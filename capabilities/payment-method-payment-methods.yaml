naftiko: 1.0.0-alpha2
info:
  label: Stripe Payment Method API — Payment Methods
  description: 'Stripe Payment Method API — Payment Methods. 6 operations. Lead operation: Payment Methods. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Payment Methods
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: payment-method-payment-methods
    baseUri: https://api.stripe.com
    description: Stripe Payment Method API — Payment Methods business capability. Self-contained, no shared references.
    resources:
    - name: v1-payment_methods
      path: /v1/payment_methods
      operations:
      - name: getpaymentmethods
        method: GET
        description: <p>Returns a list of PaymentMethods for Treasury flows. If you want to list the PaymentMethods attached
          to a Customer for payments, you should use the <a href="/docs/api/payment_methods/customer_list">List a Customer’s
          PaymentMethods</a> AP
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customer
          in: query
          type: string
          description: The ID of the customer whose PaymentMethods will be retrieved.
        - name: ending_before
          in: query
          type: string
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 ob
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: limit
          in: query
          type: integer
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default
            is 10.
        - name: starting_after
          in: query
          type: string
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list.
            For instance, if you make a list request and receive 100 o
        - name: type
          in: query
          type: string
          description: An optional filter on the list, based on the object `type` field. Without the filter, the list includes
            all current and future payment method types. If your int
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postpaymentmethods
        method: POST
        description: <p>Creates a PaymentMethod object. Read the <a href="/docs/stripe-js/reference#stripe-create-payment-method">Stripe.js
          reference</a> to learn how to create PaymentMethods via Stripe.js.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-payment_methods-payment_method
      path: /v1/payment_methods/{payment_method}
      operations:
      - name: getpaymentmethodspaymentmethod
        method: GET
        description: <p>Retrieves a PaymentMethod object attached to the StripeAccount. To retrieve a payment method attached
          to a Customer, you should use <a href="/docs/api/payment_methods/customer">Retrieve a Customer’s PaymentMethods</a></p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: expand
          in: query
          type: array
          description: Specifies which fields in the response should be expanded.
        - name: payment_method
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: postpaymentmethodspaymentmethod
        method: POST
        description: <p>Updates a PaymentMethod object. A PaymentMethod must be attached a customer to be updated.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payment_method
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-payment_methods-payment_method-attach
      path: /v1/payment_methods/{payment_method}/attach
      operations:
      - name: postpaymentmethodspaymentmethodattach
        method: POST
        description: <p>Attaches a PaymentMethod object to a Customer.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payment_method
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-payment_methods-payment_method-detach
      path: /v1/payment_methods/{payment_method}/detach
      operations:
      - name: postpaymentmethodspaymentmethoddetach
        method: POST
        description: <p>Detaches a PaymentMethod object from a Customer. After a PaymentMethod is detached, it can no longer
          be used for a payment or re-attached to a Customer.</p>
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payment_method
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
