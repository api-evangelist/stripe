          mapping: $.
    - path: /v1/v1/payment-methods/{payment-method}/attach
      name: v1-payment-methods-payment-method-attach
      description: REST surface for v1-payment_methods-payment_method-attach.
      operations:
      - method: POST
        name: postpaymentmethodspaymentmethodattach
        description: <p>Attaches a PaymentMethod object to a Customer.</p>
        call: payment-method-payment-methods.postpaymentmethodspaymentmethodattach
        with:
          payment_method: rest.payment_method
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/payment-methods/{payment-method}/detach
      name: v1-payment-methods-payment-method-detach
      description: REST surface for v1-payment_methods-payment_method-detach.
      operations:
      - method: POST
        name: postpaymentmethodspaymentmethoddetach
        description: <p>Detaches a PaymentMethod object from a Customer. After a PaymentMethod is detached, it can no longer
          be used for a payment or re-attached to a Customer.</p>
        call: payment-method-payment-methods.postpaymentmethodspaymentmethoddetach
        with:
          payment_method: rest.payment_method
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payment-method-payment-methods-mcp
    port: 9090
