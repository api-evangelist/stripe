naftiko: 1.0.0-alpha2
info:
  label: Stripe Accounts API — Sessions
  description: 'Stripe Accounts API — Sessions. 1 operations. Lead operation: Stripe Create Account Session. Self-contained
    Naftiko capability covering one Stripe business surface.'
  tags:
  - Stripe
  - Sessions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: accounts-sessions
    baseUri: https://api.stripe.com
    description: Stripe Accounts API — Sessions business capability. Self-contained, no shared references.
    resources:
    - name: v1-account_sessions
      path: /v1/account_sessions
      operations:
      - name: postaccountsessions
        method: POST
        description: Stripe Create Account Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: accounts-sessions-rest
    port: 8080
    description: REST adapter for Stripe Accounts API — Sessions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/account-sessions
      name: v1-account-sessions
      description: REST surface for v1-account_sessions.
      operations:
      - method: POST
        name: postaccountsessions
        description: Stripe Create Account Session
        call: accounts-sessions.postaccountsessions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: accounts-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Accounts API — Sessions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: stripe-create-account-session
      description: Stripe Create Account Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: accounts-sessions.postaccountsessions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
