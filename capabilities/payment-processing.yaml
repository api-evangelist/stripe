naftiko: 1.0.0-alpha2
info:
  label: Stripe Payment Processing
  description: Unified capability for end-to-end payment processing workflows. Combines Stripe Payment Intents and Checkout
    APIs to support payment creation, confirmation, capture, refunds, and dispute management. Used by e-commerce platforms,
    SaaS billing teams, and payment operations engineers.
  tags:
  - Stripe
  - Payments
  - Checkout
  - Refunds
  - Disputes
  - E-Commerce
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: stripe-payment-intents
    baseUri: https://api.stripe.com
    description: Stripe Payment Intents API for creating and managing payment flows.
    authentication:
      type: bearer
      token: '{{STRIPE_API_KEY}}'
    resources:
    - name: payment-intents
      path: /v1/payment_intents
      description: Payment intent collection operations
      operations:
      - name: list-payment-intents
        method: GET
        description: List all payment intents
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return
        - name: customer
          in: query
          type: string
          required: false
          description: Filter by customer ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-payment-intent
        method: POST
        description: Create a new payment intent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            amount: '{{tools.amount}}'
            currency: '{{tools.currency}}'
            customer: '{{tools.customer}}'
    - name: payment-intent-search
      path: /v1/payment_intents/search
      description: Search payment intents
      operations:
      - name: search-payment-intents
        method: GET
        description: Search payment intents by query string
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: Search query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-intent
      path: /v1/payment_intents/{intent}
      description: Individual payment intent operations
      operations:
      - name: get-payment-intent
        method: GET
        description: Retrieve a payment intent by ID
        inputParameters:
        - name: intent
          in: path
          type: string
          required: true
          description: Payment intent ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-payment-intent
        method: POST
        description: Update a payment intent
        inputParameters:
        - name: intent
          in: path
          type: string
          required: true
          description: Payment intent ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-intent-confirm
      path: /v1/payment_intents/{intent}/confirm
      description: Confirm a payment intent
      operations:
      - name: confirm-payment-intent
        method: POST
        description: Confirm a payment intent to execute the payment
        inputParameters:
        - name: intent
          in: path
          type: string
          required: true
          description: Payment intent ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-intent-capture
      path: /v1/payment_intents/{intent}/capture
      description: Capture an authorized payment intent
      operations:
      - name: capture-payment-intent
        method: POST
        description: Capture funds for an authorized payment intent
        inputParameters:
        - name: intent
          in: path
          type: string
          required: true
          description: Payment intent ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: payment-intent-cancel
      path: /v1/payment_intents/{intent}/cancel
      description: Cancel a payment intent
      operations:
      - name: cancel-payment-intent
        method: POST
        description: Cancel a payment intent that has not been captured
        inputParameters:
        - name: intent
          in: path
          type: string
          required: true
          description: Payment intent ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: stripe-checkout
    baseUri: https://api.stripe.com
    description: Stripe Checkout API for hosted and embedded payment pages.
    authentication:
      type: bearer
      token: '{{STRIPE_API_KEY}}'
    resources:
    - name: checkout-sessions
      path: /v1/checkout/sessions
      description: Checkout session collection
      operations:
      - name: list-checkout-sessions
        method: GET
        description: List all checkout sessions
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Max items to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-checkout-session
        method: POST
        description: Create a new checkout session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            success_url: '{{tools.success_url}}'
            cancel_url: '{{tools.cancel_url}}'
            mode: '{{tools.mode}}'
    - name: checkout-session
      path: /v1/checkout/sessions/{session}
      description: Individual checkout session
      operations:
      - name: get-checkout-session
        method: GET
        description: Retrieve a checkout session by ID
        inputParameters:
        - name: session
          in: path
          type: string
          required: true
          description: Checkout session ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: checkout-session-expire
      path: /v1/checkout/sessions/{session}/expire
      description: Expire a checkout session
      operations:
      - name: expire-checkout-session
        method: POST
        description: Expire a checkout session before it naturally expires
        inputParameters:
        - name: session
          in: path
          type: string
          required: true
          description: Checkout session ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: checkout-session-line-items
      path: /v1/checkout/sessions/{session}/line_items
      description: Line items for a checkout session
      operations:
      - name: list-checkout-session-line-items
        method: GET
        description: List line items for a checkout session
        inputParameters:
        - name: session
          in: path
          type: string
          required: true
          description: Checkout session ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: stripe-refunds
    baseUri: https://api.stripe.com
    description: Stripe Refunds API for managing charge reversals.
    authentication:
      type: bearer
      token: '{{STRIPE_API_KEY}}'
    resources:
    - name: refunds
      path: /v1/refunds
      description: Refund collection
      operations:
      - name: list-refunds
        method: GET
        description: List all refunds
        inputParameters:
        - name: charge
          in: query
          type: string
          required: false
          description: Filter by charge ID
        - name: limit
          in: query
          type: integer
          required: false
          description: Max items to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-refund
        method: POST
        description: Create a refund
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            charge: '{{tools.charge}}'
            amount: '{{tools.amount}}'
    - name: refund
      path: /v1/refunds/{refund}
      description: Individual refund
      operations:
      - name: get-refund
        method: GET
        description: Retrieve a refund by ID
        inputParameters:
        - name: refund
          in: path
          type: string
          required: true
          description: Refund ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: refund-cancel
      path: /v1/refunds/{refund}/cancel
      description: Cancel a refund
      operations:
      - name: cancel-refund
        method: POST
        description: Cancel a pending refund
        inputParameters:
        - name: refund
          in: path
          type: string
          required: true
          description: Refund ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: stripe-disputes
    baseUri: https://api.stripe.com
    description: Stripe Disputes API for managing chargebacks.
    authentication:
      type: bearer
      token: '{{STRIPE_API_KEY}}'
    resources:
    - name: disputes
      path: /v1/disputes
      description: Dispute collection
      operations:
      - name: list-disputes
        method: GET
        description: List all disputes
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Max items to return
        - name: charge
          in: query
          type: string
          required: false
          description: Filter by charge ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dispute
      path: /v1/disputes/{dispute}
      description: Individual dispute
      operations:
      - name: get-dispute
        method: GET
        description: Retrieve a dispute by ID
        inputParameters:
        - name: dispute
          in: path
          type: string
          required: true
          description: Dispute ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-dispute
        method: POST
        description: Update dispute evidence
        inputParameters:
        - name: dispute
          in: path
          type: string
          required: true
          description: Dispute ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dispute-close
      path: /v1/disputes/{dispute}/close
      description: Close a dispute
      operations:
      - name: close-dispute
        method: POST
        description: Close a dispute by accepting the chargeback
        inputParameters:
        - name: dispute
          in: path
          type: string
          required: true
          description: Dispute ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: stripe-payment-processing-api
    description: Unified REST API for Stripe payment processing workflows.
    resources:
    - path: /v1/payment-intents
      name: payment-intents
      description: Manage payment intents for custom payment flows
      operations:
      - method: GET
        name: list-payment-intents
        description: List payment intents
        call: stripe-payment-intents.list-payment-intents
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-payment-intent
        description: Create a payment intent
        call: stripe-payment-intents.create-payment-intent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-intents/{intent}
      name: payment-intent
      description: Individual payment intent
      operations:
      - method: GET
        name: get-payment-intent
        description: Get a payment intent
        call: stripe-payment-intents.get-payment-intent
        with:
          intent: rest.intent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-intents/{intent}/confirm
      name: payment-intent-confirm
      description: Confirm a payment intent
      operations:
      - method: POST
        name: confirm-payment-intent
        description: Confirm payment intent
        call: stripe-payment-intents.confirm-payment-intent
        with:
          intent: rest.intent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payment-intents/{intent}/capture
      name: payment-intent-capture
      description: Capture payment funds
      operations:
      - method: POST
        name: capture-payment-intent
        description: Capture authorized payment
        call: stripe-payment-intents.capture-payment-intent
        with:
          intent: rest.intent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/checkout-sessions
      name: checkout-sessions
      description: Hosted checkout sessions
      operations:
      - method: GET
        name: list-checkout-sessions
        description: List checkout sessions
        call: stripe-checkout.list-checkout-sessions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-checkout-session
        description: Create a hosted checkout session
        call: stripe-checkout.create-checkout-session
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/refunds
      name: refunds
      description: Payment refunds
      operations:
      - method: GET
        name: list-refunds
        description: List refunds
        call: stripe-refunds.list-refunds
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-refund
        description: Create a refund
        call: stripe-refunds.create-refund
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disputes
      name: disputes
      description: Payment disputes and chargebacks
      operations:
      - method: GET
        name: list-disputes
        description: List disputes
        call: stripe-disputes.list-disputes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/disputes/{dispute}
      name: dispute
      description: Individual dispute
      operations:
      - method: GET
        name: get-dispute
        description: Get a dispute
        call: stripe-disputes.get-dispute
        with:
          dispute: rest.dispute
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: stripe-payment-processing-mcp
    transport: http
    description: MCP server for AI-assisted Stripe payment processing workflows.
    tools:
    - name: list-payment-intents
      description: List Stripe payment intents with optional filters
      hints:
        readOnly: true
        openWorld: true
      call: stripe-payment-intents.list-payment-intents
      outputParameters:
      - type: object
        mapping: $.
    - name: create-payment-intent
      description: Create a new Stripe payment intent for collecting payment
      hints:
        readOnly: false
        destructive: false
      call: stripe-payment-intents.create-payment-intent
      outputParameters:
      - type: object
        mapping: $.
    - name: get-payment-intent
      description: Retrieve a Stripe payment intent by ID
      hints:
        readOnly: true
      call: stripe-payment-intents.get-payment-intent
      with:
        intent: tools.intent
      outputParameters:
      - type: object
        mapping: $.
    - name: confirm-payment-intent
      description: Confirm a Stripe payment intent to execute the payment
      hints:
        readOnly: false
        destructive: false
      call: stripe-payment-intents.confirm-payment-intent
      with:
        intent: tools.intent
      outputParameters:
      - type: object
        mapping: $.
    - name: capture-payment-intent
      description: Capture authorized funds for a Stripe payment intent
      hints:
        readOnly: false
        destructive: false
      call: stripe-payment-intents.capture-payment-intent
      with:
        intent: tools.intent
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-payment-intent
      description: Cancel an uncaptured Stripe payment intent
      hints:
        readOnly: false
        destructive: true
      call: stripe-payment-intents.cancel-payment-intent
      with:
        intent: tools.intent
      outputParameters:
      - type: object
        mapping: $.
    - name: create-checkout-session
      description: Create a Stripe hosted checkout page for payment collection
      hints:
        readOnly: false
        destructive: false
      call: stripe-checkout.create-checkout-session
      outputParameters:
      - type: object
        mapping: $.
    - name: get-checkout-session
      description: Retrieve details of a Stripe checkout session
      hints:
        readOnly: true
      call: stripe-checkout.get-checkout-session
      with:
        session: tools.session
      outputParameters:
      - type: object
        mapping: $.
    - name: create-refund
      description: Create a refund on a Stripe charge or payment intent
      hints:
        readOnly: false
        destructive: false
      call: stripe-refunds.create-refund
      outputParameters:
      - type: object
        mapping: $.
    - name: list-refunds
      description: List Stripe refunds
      hints:
        readOnly: true
      call: stripe-refunds.list-refunds
      outputParameters:
      - type: object
        mapping: $.
    - name: list-disputes
      description: List Stripe payment disputes (chargebacks)
      hints:
        readOnly: true
      call: stripe-disputes.list-disputes
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dispute
      description: Get details of a specific Stripe dispute
      hints:
        readOnly: true
      call: stripe-disputes.get-dispute
      with:
        dispute: tools.dispute
      outputParameters:
      - type: object
        mapping: $.
    - name: update-dispute
      description: Update evidence for a Stripe dispute to contest a chargeback
      hints:
        readOnly: false
        destructive: false
      call: stripe-disputes.update-dispute
      with:
        dispute: tools.dispute
      outputParameters:
      - type: object
        mapping: $.
