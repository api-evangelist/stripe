naftiko: 1.0.0-alpha2
info:
  label: Stripe Files API — Post
  description: 'Stripe Files API — Post. 1 operations. Lead operation: Stripe Post   Files. Self-contained Naftiko capability
    covering one Stripe business surface.'
  tags:
  - Stripe
  - Post
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STRIPE_API_KEY: STRIPE_API_KEY
capability:
  consumes:
  - type: http
    namespace: files-post
    baseUri: https://api.stripe.com
    description: Stripe Files API — Post business capability. Self-contained, no shared references.
    resources:
    - name: v1-files
      path: /v1/files
      operations:
      - name: postfiles
        method: POST
        description: Stripe Post   Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.STRIPE_API_KEY}}'
  exposes:
  - type: rest
    namespace: files-post-rest
    port: 8080
    description: REST adapter for Stripe Files API — Post. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/files
      name: v1-files
      description: REST surface for v1-files.
      operations:
      - method: POST
        name: postfiles
        description: Stripe Post   Files
        call: files-post.postfiles
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: files-post-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stripe Files API — Post. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: stripe-post-files
      description: Stripe Post   Files
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: files-post.postfiles
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
